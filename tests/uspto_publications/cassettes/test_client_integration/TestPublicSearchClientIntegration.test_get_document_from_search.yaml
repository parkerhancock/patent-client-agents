        20060101\",\"F01D19/02 20060101\",\"F02C7/32 20060101\"],\"curIntlPatentClassificationSecondaryDateKwicHits\":null,\"abstractHtml\":\"An
        engine system of an aircraft includes an energy storage system, a gas turbine
        engine, and a controller. The gas turbine engine includes a low spool, a high
        spool, a low-spool generator operably coupled to the low spool, and a high-spool
        electric motor operably coupled to the high spool. The controller is configured
        to detect a braking condition of the aircraft, transfer power from the low-spool
        generator to the energy storage system based on the storage capacity state
        of the energy storage system, and transfer power to the high spool through
        the high-spool electric motor to support combustion in the gas turbine engine
        while a rotational speed of the low spool is reduced responsive to the low-spool
        generator extracting energy from the low spool.\",\"descriptionHtml\":\"BRIEF
        DESCRIPTION OF THE DRAWINGS<br />[0019] The following descriptions should
        not be considered limiting in any way. With reference to the accompanying
        drawings, like elements are numbered alike:<br />[0020] <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>1</b></figref> is a schematic diagram of an aircraft, in accordance with
        an embodiment of the disclosure;<br />[0021] <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>2</b></figref> is a schematic diagram of a hybrid electric propulsion system,
        in accordance with an embodiment of the disclosure;<br />[0022] <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>3</b></figref> is a schematic diagram of control signal paths of a hybrid
        electric propulsion system, in accordance with an embodiment of the disclosure;<br
        />[0023] <figref idref=\\\"DRAWINGS\\\">FIG. <b>4</b></figref> is a plot of
        low-spool speed and thrust before and after a braking condition, in accordance
        with an embodiment of the disclosure;<br />[0024] <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>5</b></figref> is a plot of fuel flow before and after a braking condition,
        in accordance with an embodiment of the disclosure;<br />[0025] <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>6</b></figref> is a plot of torque change on a low spool and a high spool
        before and after a braking condition, in accordance with an embodiment of
        the disclosure;<br />[0026] <figref idref=\\\"DRAWINGS\\\">FIG. <b>7</b></figref>
        is a plot of electrical power output change at a low-spool electric machine
        and a high-spool electric machine before and after a braking condition, in
        accordance with an embodiment of the disclosure; and<br />[0027] <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>8</b></figref> is a flow chart illustrating a method, in accordance with
        an embodiment of the disclosure.<br />DETAILED DESCRIPTION<br />[0028] A detailed
        description of one or more embodiments of the disclosed apparatus and method
        are presented herein by way of exemplification and not limitation with reference
