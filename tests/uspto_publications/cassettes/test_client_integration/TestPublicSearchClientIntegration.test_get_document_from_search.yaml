        one of the hybrid electric propulsion systems <b>100</b>A, <b>100</b>B is
        operating in a fuel burning mode while the other of the hybrid electric propulsion
        systems <b>100</b>A, <b>100</b>B is operated using the low-spool electric
        motor <b>12</b>A and/or the high-spool electric motor <b>13</b>A.<br />[0047]
        <figref idref=\\\"DRAWINGS\\\">FIGS. <b>4</b>-<b>7</b></figref> illustrate
        an example scenario of a response of the engine system <b>100</b> of <figref
        idref=\\\"DRAWINGS\\\">FIG. <b>2</b></figref> to a braking condition. <figref
        idref=\\\"DRAWINGS\\\">FIG. <b>4</b></figref> is a plot <b>300</b> of low-spool
        speed <b>302</b> and low-spool thrust <b>304</b> before and after a braking
        condition <b>306</b>. <figref idref=\\\"DRAWINGS\\\">FIG. <b>5</b></figref>
        is a plot <b>310</b> of fuel flow <b>312</b> before and after the braking
        condition <b>306</b>. <figref idref=\\\"DRAWINGS\\\">FIG. <b>6</b></figref>
        is a plot <b>320</b> of low-spool torque <b>322</b> and a high spool torque
        <b>324</b> before and after the braking condition <b>306</b>. <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>7</b></figref> is a plot <b>330</b> of low-spool electrical power output
        <b>332</b> and high-spool electric power output <b>334</b> before and after
        the braking condition <b>306</b>. In the example scenario of <figref idref=\\\"DRAWINGS\\\">FIGS.
        <b>4</b>-<b>7</b></figref>, gas turbine engine <b>20</b> is running on a minimum
        fuel limit and cannot reach a lower thrust. The braking condition <b>306</b>
        occurs at about a time of 25 seconds, and the controller <b>256</b> switches
        to a thrust spoiling mode where a further reduction of the low-spool speed
        <b>302</b> and low-spool thrust <b>304</b> is initiated while the fuel flow
        <b>312</b> remains at the minimum fuel limit. The controller <b>256</b> puts
        the low-spool electric machine <b>12</b> in low-spool generator mode or engages
        the low-spool generator <b>12</b>B depending on the system configuration.
        The low-spool generator <b>12</b>B absorbs some energy from the low spool
        <b>30</b>, increasing low-spool torque <b>322</b> and low-spool electrical
        power output <b>332</b>. The controller <b>256</b> can also put the high-spool
        electric machine <b>13</b> into high-spool motor mode or engage the high-spool
        electric motor <b>13</b>A that reduces high spool torque <b>324</b> and high-spool
        electric power output <b>334</b>. Although the sequence of <figref idref=\\\"DRAWINGS\\\">FIGS.
        <b>4</b>-<b>7</b></figref> illustrates one example scenario, many other braking
        and power transfer scenarios can be achieved by the engine system <b>100</b>
        of <figref idref=\\\"DRAWINGS\\\">FIG. <b>2</b></figref>.<br />[0048] Referring
        now to <figref idref=\\\"DRAWINGS\\\">FIG. <b>8</b></figref> with continued
        reference to <figref idref=\\\"DRAWINGS\\\">FIGS. <b>1</b>-<b>7</b></figref>,
        <figref idref=\\\"DRAWINGS\\\">FIG. <b>8</b></figref> is a flow chart illustrating
        a method <b>400</b> for providing hybrid electric idle and braking for an
        aircraft, in accordance with an embodiment. The method <b>400</b> may be performed,
        for example, by the aircraft <b>10</b> through the hybrid electric propulsion
        systems <b>100</b>A, <b>100</b>B of <figref idref=\\\"DRAWINGS\\\">FIG. <b>1</b></figref>.
        For purposes of explanation, the method <b>400</b> is described primarily
        with respect to the hybrid electric propulsion system <b>100</b> of <figref
        idref=\\\"DRAWINGS\\\">FIG. <b>2</b></figref>; however, it will be understood
        that the method <b>400</b> can be performed on other configurations (not depicted).<br
        />[0049] Method <b>400</b> pertains to the controller <b>256</b> executing
        embedded code for braking and thrust control using hybrid engine control <b>266</b>
        along with other control functions, where the controller <b>256</b> can be
        an aircraft-level control or distributed between aircraft and engine system
        levels of control.<br />[0050] At block <b>402</b>, the controller <b>256</b>
        can detect a braking condition of the aircraft <b>10</b>. The braking condition
        can be received as an input signal based on a pilot request, such as braking
        command <b>274</b>. The braking condition can be an intermittent braking condition
        that occurs for a predetermined interval. For example, the intermittent braking
        condition can be used to reduce acceleration, such as inching forward during
        ground-based operation of the aircraft <b>10</b>. After the predetermined
        interval elapses, the braking condition may be removed, for instance, until
        another braking command <b>274</b> is received. There can be an interval between
        braking applications to support intermittent braking. For example, braking
        can be applied using a braking on-off duty cycle which can be configured within
        a range. For instance, the duty cycle can be a configured with braking active
        10%, 25%, 50%, 75%, 90%, or another value between braking fully on and fully
        off during intermittent braking. Further, the braking condition may be detected
        based on operating conditions of the gas turbine engine <b>20</b> and/or the
        aircraft <b>10</b>. For example, the braking condition can be determined based
        on a thrust command <b>270</b> and an operating mode <b>272</b> of the aircraft
        <b>10</b>, such as an idle thrust in a taxi mode or a landing mode. The braking
        condition need not be associated with an explicit command to apply brakes.
        Other operating modes above idle where reduced power settings are desired
        may also or alternatively be a valid operating condition for the process described
        herein.<br />[0051] At block <b>404</b>, the controller <b>256</b> can determine
        a storage capacity state of the energy storage system <b>218</b> of the aircraft
        <b>10</b>. The storage capacity state can indicate a capacity to receive a
        power surge from the low-spool generator <b>12</b>B of one or more of the
        gas turbine engines <b>20</b>. The determination can include considering whether
        both gas turbine engines <b>20</b> are operating in a fuel combustion state,
        an electrical demand of the aircraft <b>10</b> from the energy storage system
        <b>218</b>, and storage capacity remaining. The ability of the energy storage
        system <b>218</b> to accept an influx of current from the low-spool generator
        <b>12</b>B of either or both of the gas turbine engines <b>20</b> of the aircraft
        <b>10</b> may use a customized charging schedule where the ability of the
        energy storage system <b>218</b> to be charged can have a non-linear mapping.
        For instance, a charging rate between a 50% and 60% capacity may differ from
        a charging rate between 90% and 100% capacity.<br />[0052] At block <b>406</b>,
        power can be transferred from a low-spool generator <b>12</b>B to the energy
        storage system <b>218</b> based on the storage capacity state of the energy
        storage system <b>218</b>. The controller <b>256</b> can be configured to
        split energy output of the low-spool generator <b>12</b>B between the energy
        storage system <b>218</b> and the high-spool electric motor <b>13</b>A based
        on the storage capacity state and a target speed of the high spool <b>32</b>.
        The energy transfer can be performed in response to detecting the braking
        condition or during braking.<br />[0053] At block <b>408</b>, power can be
        transferred to the high spool <b>32</b> through the high-spool electric motor
        <b>13</b>A to support combustion in the gas turbine engine <b>20</b> while
        a rotational speed of the low spool <b>30</b> is reduced responsive to the
        low-spool generator <b>12</b>B extracting energy from the low spool <b>30</b>.
        For example, the controller <b>256</b> can determine a demand associated with
        one or more accessories <b>70</b> driven by the high spool <b>32</b> and one
        or more target engine pressures. The high-spool electric motor <b>13</b>A
        can be controlled to adjust a rotational speed of the high spool <b>32</b>
        based on the demand associated with the one or more accessories <b>70</b>
        driven by the high spool <b>32</b> and the one or more target engine pressures.
        Power transfer to the high spool <b>32</b> through the high-spool electric
        motor <b>13</b>A can be performed or modified when the thrust reverser <b>75</b>
        is deployed. The power transfer can be performed in response to detecting
        the braking condition or during braking.<br />[0054] The controller <b>256</b>
        can also be configured to monitor for a flutter condition during landing of
        the aircraft <b>10</b> and adjust operation of the low-spool generator <b>12</b>B
        and/or the high-spool electric motor <b>13</b>A to reduce the flutter condition.
        The braking condition can include operating the gas turbine engine <b>20</b>
        at a minimum fuel limit. The low-spool generator <b>12</b>B can reduce a speed
        and thrust output of the low spool <b>30</b> below nominal minimum values
        associated with the minimum fuel limit by adding a load to the low spool <b>30</b>.<br
        />[0055] While the above description has described the flow process of <figref
        idref=\\\"DRAWINGS\\\">FIG. <b>8</b></figref> in a particular order, it should
        be appreciated that unless otherwise specifically required in the attached
        claims that the ordering of the steps may be varied. Also, it is clear to
        one of ordinary skill in the art that, the hybrid electric idle and braking
        described herein can be combined with aircraft and propulsion system control
        features, such as fuel flow control, power management, emergency operation,
        and the like.<br />[0056] The term \u201Cabout\u201D is intended to include
        the degree of error associated with measurement of the particular quantity
        based upon the equipment available at the time of filing the application.
        For example, \u201Cabout\u201D can include a range of \xB18% or 5%, or 2%
        of a given value.<br />[0057] The terminology used herein is for the purpose
        of describing particular embodiments only and is not intended to be limiting
        of the present disclosure. As used herein, the singular forms \u201Ca\u201D,
        \u201Can\u201D and \u201Cthe\u201D are intended to include the plural forms
        as well, unless the context clearly indicates otherwise. It will be further
        understood that the terms \u201Ccomprises\u201D and/or \u201Ccomprising,\u201D
        when used in this specification, specify the presence of stated features,
        integers, steps, operations, elements, and/or components, but do not preclude
        the presence or addition of one or more other features, integers, steps, operations,
        element components, and/or groups thereof.<br />[0058] While the present disclosure
        has been described with reference to an exemplary embodiment or embodiments,
        it will be understood by those skilled in the art that various changes may
        be made and equivalents may be substituted for elements thereof without departing
        from the scope of the present disclosure. In addition, many modifications
        may be made to adapt a particular situation or material to the teachings of
        the present disclosure without departing from the essential scope thereof.
        Therefore, it is intended that the present disclosure not be limited to the
        particular embodiment disclosed as the best mode contemplated for carrying
        out this present disclosure, but that the present disclosure will include
        all embodiments falling within the scope of the claims.\",\"claimsHtml\":\"<b>1</b>.
        An engine system of an aircraft, the engine system comprising: an energy storage
        system; a first gas turbine engine comprising a low spool, a high spool, a
        low-spool generator operably coupled to the low spool, and a high-spool electric
        motor operably coupled to the high spool; and a controller configured to:
        detect a braking condition of the aircraft; determine a fuel combustion state
        of the first gas turbine engine and a second gas turbine engine of the aircraft;
        determine an electrical demand of the aircraft from the energy storage system
        associated with the fuel combustion state of the first gas turbine engine
        and the second gas turbine engine; determine a storage capacity state of the
        energy storage system; transfer power from the low-spool generator to the
        energy storage system based on the storage capacity state of the energy storage
        system and the electrical demand; and transfer power to the high spool through
        the high-spool electric motor to support combustion in the first gas turbine
        engine while a rotational speed of the low spool is reduced responsive to
        the low-spool generator extracting energy from the low spool.   <br /> <b>2</b>.
        The engine system of claim 1, wherein the controller is further configured
        to detect the braking condition based on a thrust command and an operating
        mode of the aircraft. <br /> <b>3</b>. The engine system of claim 1, wherein
        power transfer is performed based on determining that the operating mode of
        the aircraft is a taxi mode or a landing mode. <br /> <b>4</b>. The engine
        system of claim 1, wherein the low-spool generator is a low-spool electric
        machine configurable between a low-spool generator mode and a low-spool motor
        mode of operation, and the high-spool electric motor is a high-spool electric
        machine configurable between a high-spool generator mode and a high-spool
        motor mode of operation. <br /> <b>5</b>. The engine system of claim 1, wherein
        the storage capacity state indicates a capacity to receive a power surge from
        the low-spool generator. <br /> <b>6</b>. The engine system of claim 5, wherein
        the controller is configured to split energy output of the low-spool generator
        between the energy storage system and the high-spool electric motor based
        on the storage capacity state and a target speed of the high spool. <br />
        <b>7</b>. The engine system of claim 6, wherein the controller is configured
        to: determine a demand associated with one or more accessories driven by the
        high spool and one or more target engine pressures; and control the high-spool
        electric motor to adjust a rotational speed of the high spool during the braking
        condition based on the demand associated with the one or more accessories
        driven by the high spool and the one or more target engine pressures.  <br
        /> <b>8</b>. The engine system of claim 1, wherein the controller is configured
        to monitor for a flutter condition during landing of the aircraft and adjust
        operation of the low-spool generator and/or the high-spool electric motor
        to reduce the flutter condition. <br /> <b>9</b>. The engine system of claim
        1, wherein the braking condition comprises operating the first gas turbine
        engine at a minimum fuel limit, and the low-spool generator reduces a speed
        and thrust output of the low spool below nominal minimum values associated
        with the minimum fuel limit by adding a load to the low spool. <br /> <b>10</b>.
        The engine system of claim 1, wherein the first gas turbine engine further
        comprises a thrust reverser, and power transfer to the high spool through
        the high-spool electric motor is performed when the thrust reverser is deployed.
        <br /> <b>11</b>. A method comprising: detecting a braking condition of an
        aircraft comprising a first gas turbine engine and a second gas turbine engine,
        the first gas turbine engine comprising a low spool and a high spool; determining
        a fuel combustion state of the first gas turbine engine and the second gas
        turbine engine; determining an electrical demand from an energy storage system
        of the aircraft, the electrical demand associated with the fuel combustion
        state of the first gas turbine engine and the second gas turbine engine; determining
        a storage capacity state of the energy storage system; transferring power
        from a low-spool generator to the energy storage system based on the storage
        capacity state of the energy storage system and the electrical demand; and
        transferring power to the high spool through a high-spool electric motor to
        support combustion in the first gas turbine engine while a rotational speed
        of the low spool is reduced responsive to the low-spool generator extracting
        energy from the low spool.  <br /> <b>12</b>. The method of claim 11, further
        comprising: detecting the braking condition based on a thrust command and
        an operating mode of the aircraft.  <br /> <b>13</b>. The method of claim
        11, wherein power transfer is performed based on determining that the operating
        mode of the aircraft is a taxi mode or a landing mode. <br /> <b>14</b>. The
        method of claim 11, wherein the low-spool generator is a low-spool electric
        machine configurable between a low-spool generator mode and a low-spool motor
        mode of operation, and the high-spool electric motor is a high-spool electric
        machine configurable between a high-spool generator mode and a high-spool
        motor mode of operation. <br /> <b>15</b>. The method of claim 11, wherein
        the storage capacity state indicates a capacity to receive a power surge from
        the low-spool generator. <br /> <b>16</b>. The method of claim 15, further
        comprising: splitting energy output of the low-spool generator between the
        energy storage system and the high-spool electric motor based on the storage
        capacity state and a target speed of the high spool.  <br /> <b>17</b>. The
        method of claim 16, further comprising: determining a demand associated with
        one or more accessories driven by the high spool and one or more target engine
        pressures; and controlling the high-spool electric motor to adjust a rotational
        speed of the high spool during the braking condition based on the demand associated
        with the one or more accessories driven by the high spool and the one or more
        target engine pressures.  <br /> <b>18</b>. The method of claim 11, further
        comprising: monitoring for a flutter condition during landing of the aircraft;
        and adjusting operation of the low-spool generator and/or the high-spool electric
        motor to reduce the flutter condition.  <br /> <b>19</b>. The method of claim
        11, wherein the braking condition comprises operating the first gas turbine
        engine at a minimum fuel limit, and the low-spool generator reduces a speed
        and thrust output of the low spool below nominal minimum values associated
        with the minimum fuel limit by adding a load to the low spool. <br /> <b>20</b>.
        The method of claim 11, wherein the first gas turbine engine further comprises
        a thrust reverser, and power transfer to the high spool through the high-spool
        electric motor is performed when the thrust reverser is deployed.\",\"briefHtml\":\"BACKGROUND<br
        />[0002] Exemplary embodiments of the present disclosure pertain to the art
        of rotating machinery and, more particularly, to a method and a system for
        hybrid electric idle and braking for an aircraft.<br />[0003] Gas turbine
        engines are typically inefficient to operate at low power settings. Operation
        of a gas turbine engine at idle is the typical lowest power setting available
        once the gas turbine engine has been started. In some instances, thrust produced
        at idle may be greater than the thrust needed for ground-based operations,
        such as taxiing and waiting in a parked position prior to takeoff or after
        landing. This can result in excess fuel consumption and may reduce component
        life with many repeated taxi, takeoff, and landing cycles. The excess thrust
        is typically managed by using brakes. Brake wear and deterioration can occur
        during taxi prior to takeoff and after landing.<br />BRIEF DESCRIPTION<br
        />[0004] Disclosed is an engine system of an aircraft that includes an energy
        storage system, a gas turbine engine, and a controller. The gas turbine engine
        includes a low spool, a high spool, a low-spool generator operably coupled
        to the low spool, and a high-spool electric motor operably coupled to the
        high spool. The controller is configured to detect a braking condition of
        the aircraft, transfer power from the low-spool generator to the energy storage
        system based on the storage capacity state of the energy storage system, and
        transfer power to the high spool through the high-spool electric motor to
        support combustion in the gas turbine engine while a rotational speed of the
        low spool is reduced responsive to the low-spool generator extracting energy
        from the low spool.<br />[0005] In addition to one or more of the features
        described above, or as an alternative to any of the foregoing embodiments,
        the controller can be further configured to detect the braking condition based
        on a thrust command and an operating mode of the aircraft.<br />[0006] In
        addition to one or more of the features described above, or as an alternative
        to any of the foregoing embodiments, power transfer can be performed based
        on determining that the operating mode of the aircraft is a taxi mode or a
        landing mode.<br />[0007] In addition to one or more of the features described
        above, or as an alternative to any of the foregoing embodiments, the low-spool
        generator can be a low-spool electric machine configurable between a low-spool
        generator mode and a low-spool motor mode of operation, and the high-spool
        electric motor can be a high-spool electric machine configurable between a
        high-spool generator mode and a high-spool motor mode of operation.<br />[0008]
        In addition to one or more of the features described above, or as an alternative
        to any of the foregoing embodiments, the storage capacity state can indicate
        a capacity to receive a power surge from the low-spool generator.<br />[0009]
        In addition to one or more of the features described above, or as an alternative
        to any of the foregoing embodiments, the controller can be configured to split
        energy output of the low-spool generator between the energy storage system
        and the high-spool electric motor based on the storage capacity state and
        a target speed of the high spool.<br />[0010] In addition to one or more of
        the features described above, or as an alternative to any of the foregoing
        embodiments, the controller can be configured to determine a demand associated
        with one or more accessories driven by the high spool and one or more target
        engine pressures, and control the high-spool electric motor to adjust a rotational
        speed of the high spool during the braking condition based on the demand associated
        with the one or more accessories driven by the high spool and the one or more
        target engine pressures.<br />[0011] In addition to one or more of the features
        described above, or as an alternative to any of the foregoing embodiments,
        the controller can be configured to monitor for a flutter condition during
        landing of the aircraft and adjust operation of the low-spool generator and/or
        the high-spool electric motor to reduce the flutter condition.<br />[0012]
        In addition to one or more of the features described above, or as an alternative
        to any of the foregoing embodiments, the braking condition can include operating
        the gas turbine engine at a minimum fuel limit, and the low-spool generator
        can reduce a speed and thrust output of the low spool below nominal minimum
        values associated with the minimum fuel limit by adding a load to the low
        spool.<br />[0013] In addition to one or more of the features described above,
        or as an alternative to any of the foregoing embodiments, the gas turbine
        engine can include a thrust reverser, and power transfer to the high spool
        through the high-spool electric motor can be performed when the thrust reverser
        is deployed.<br />[0014] Also disclosed is a method that includes detecting
        a braking condition of an aircraft having a gas turbine engine including a
        low spool and a high spool and determining a storage capacity state of an
        energy storage system of the aircraft. Power can be transferred from a low-spool
        generator to the energy storage system based on the storage capacity state
        of the energy storage system. Power can be transferred to the high spool through
        a high-spool electric motor to support combustion in the gas turbine engine
        while a rotational speed of the low spool is reduced responsive to the low-spool
        generator extracting energy from the low spool.<br />[0015] In addition to
        one or more of the features described above, or as an alternative to any of
        the foregoing embodiments, the method can include detecting the braking condition
        based on a thrust command and an operating mode of the aircraft.<br />[0016]
        In addition to one or more of the features described above, or as an alternative
        to any of the foregoing embodiments, the method can include splitting energy
        output of the low-spool generator between the energy storage system and the
        high-spool electric motor based on the storage capacity state and a target
        speed of the high spool.<br />[0017] In addition to one or more of the features
        described above, or as an alternative to any of the foregoing embodiments,
        the method can include determining a demand associated with one or more accessories
        driven by the high spool and one or more target engine pressures, and controlling
        the high-spool electric motor to adjust a rotational speed of the high spool
        during the braking condition based on the demand associated with the one or
        more accessories driven by the high spool and the one or more target engine
        pressures.<br />[0018] In addition to one or more of the features described
        above, or as an alternative to any of the foregoing embodiments, the method
        can include monitoring for a flutter condition during landing of the aircraft,
        and adjusting operation of the low-spool generator and/or the high-spool electric
        motor to reduce the flutter condition.\",\"backgroundTextHtml\":\"CROSS-REFERENCE
