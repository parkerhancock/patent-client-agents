        In embodiments, the controller <b>256</b> can control and monitor for fault
        conditions of the gas turbine engine <b>20</b> and/or the electrical power
        system <b>210</b>. For example, the controller <b>256</b> can be integrally
        formed or otherwise in communication with a full authority digital engine
