        <b>256</b> can be an aircraft level control or be distributed between one
        or more systems of the aircraft <b>10</b> of <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>1</b></figref>. In embodiments, the controller <b>256</b> can include a
        processing system <b>260</b>, a memory system <b>262</b>, and an input/output
        interface <b>264</b>. The controller <b>256</b> can also include various operational
        controls, such as a hybrid engine control <b>266</b> that controls the hybrid
        electric system control effectors <b>240</b>, for instance, based on a thrust
        command <b>270</b>, an operating mode <b>272</b>, a braking command <b>274</b>,
        and/or a thrust reverser command <b>276</b>. The thrust command <b>270</b>
        can be a throttle lever angle or a command derived based on a throttle lever
        angle control of the aircraft <b>10</b> of <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>1</b></figref>. The operating mode <b>272</b> can indicate whether the
