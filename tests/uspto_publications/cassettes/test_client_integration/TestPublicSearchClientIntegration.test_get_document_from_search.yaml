        />[0041] As an example, during a braking condition, lowering fuel flow to
        a minimum fuel limit at engine idle can support combustion in the gas turbine
        engine <b>20</b> but may result in excess thrust leading to wear on the wheel
        and brake system <b>60</b>. Engaging the low-spool generator <b>12</b>B or
        operating the low-spool electric machine <b>12</b> in a low-spool generator
        mode can further reduce the rotational speed of the low spool <b>30</b> during
        the braking condition due to a mechanical load increase on the low spool <b>30</b>.
        Using the low-spool generator <b>12</b>B during a braking condition can reduce
        thrust below a nominal minimum thrust that typically results from operating
        the gas turbine engine <b>20</b> at idle while maintaining the minimum fuel
        limit, which may also be referred to as hybrid electric idle. The thrust reduction
        can also reduce the wear of brakes of the wheel and brake system <b>60</b>
        during the braking condition.<br />[0042] To maintain combustion and provide
        rotational power to the accessories <b>70</b>, power from the low-spool generator
        <b>12</b>B and/or from the energy storage system <b>218</b> can be transferred
