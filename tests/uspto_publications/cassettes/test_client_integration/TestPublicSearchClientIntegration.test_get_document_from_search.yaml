        high-spool electric motor <b>13</b>A while the low spool <b>30</b> is slowed.
        Speed and torque control of the high spool <b>32</b> can be monitored and
        adjusted by the addition of rotational power based on the demand associated
        with the one or more accessories <b>70</b> driven by the high spool <b>32</b>
        and one or more target engine pressures. When thrust reversers <b>75</b> are
        deployed on the gas turbine engine <b>20</b>, a greater amount of compensation
        may be needed from the high-spool electric motor <b>13</b>A. If engine braking
        through engaging the low-spool generator <b>12</b>B is performed while the
        aircraft <b>10</b> of <figref idref=\\\"DRAWINGS\\\">FIG. <b>1</b></figref>
        is airborne, performance conditions, such as flutter, can be monitored to
        determine possible stability issues. Accordingly, the low-spool generator
        <b>12</b>B can be disengaged or operated in a reduced output mode if needed
        to maintain stability within the gas turbine engine <b>20</b>. Flutter may
        appear as unstable spinning of the fan <b>42</b>, which can be detected through
        speed, vibrations, or other types of sensors.<br />[0043] <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>3</b></figref> is a schematic diagram of control signal paths <b>250</b>
        of the hybrid electric propulsion system <b>100</b> of <figref idref=\\\"DRAWINGS\\\">FIG.
        <b>2</b></figref> and is described with continued reference to <figref idref=\\\"DRAWINGS\\\">FIGS.
        <b>1</b> and <b>2</b></figref>. A controller <b>256</b> can interface with
        the low-spool power conditioning electronics <b>212</b>, high-spool power
