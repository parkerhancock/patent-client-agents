        \   <ul>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">This disclosure</span>\n        <span itemprop=\"definition\">generally
        relates to investigations of subterranean formations, and more particularly
        to apparatus and methods for reducing the contamination of formation fluids
        drawn into a downhole formation testing and sampling tool.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0003\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">Wells</span>\n        <span
        itemprop=\"definition\">are generally drilled into the ground or ocean bed
        to recover natural deposits of oil and gas, as well as other desirable materials
        that are trapped in geological formations in the Earth&#39;s crust.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0005\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">a
        well</span>\n        <span itemprop=\"definition\">is typically drilled using
        a drill bit attached to the lower end of a \u201Cdrill string\u201D Drilling
        fluid, or \u201Cmud,\u201D is typically pumped down through the drill string
        to the drill bit. The drilling fluid lubricates and cools the drill bit, and
        it carries drill cuttings back to the surface in the annulus between the drill
        string and the wellbore wall.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0005\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">one aspect of standard formation
        evaluation</span>\n        <span itemprop=\"definition\">relates to the measurements
        of the formation pressure and formation permeability. These measurements are
        essential to predicting the production capacity and production lifetime of
        a subsurface formation.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0006\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">a wireline tool</span>\n        <span itemprop=\"definition\">is
        a measurement tool that is suspended from a wireline in electrical communication
        with a control system disposed on the surface. The tool is lowered into a
        well so that it can measure formation properties at desired depths.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0007\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">a
        typical wireline tool</span>\n        <span itemprop=\"definition\">may include
        a probe that may be pressed against the wellbore wall to establish fluid communication
        with the formation. This type of wireline tool is often called a \u201Cformation
        tester.\u201D Using the probe, a formation tester measures the pressure of
        the formation fluids, generates a pressure pulse, which is used to determine
        the formation permeability. The formation tester tool also typically withdraws
        a sample of the formation fluid that is either subsequently transported to
        the surface fox analysis or analyzed downhole.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0007\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">wireline tools</span>\n        <span
        itemprop=\"definition\">In order to use any wireline tool, whether the tool
        be a resistivity, porosity or formation testing tool, the drill string must
        be removed from the well so that the tool can be lowered into the well. This
        is called a \u201Ctrip\u201D uphole. Further, the wireline tools must be lowered
        to the zone of interest, generally at or near the bottom of the hole. A combination
        of removing the drill string and lowering the wireline tools downhole are
        time-consuming measures and can take up to several hours, depending upon the
        depth of the wellbore. Because of the great expense and rig time required
        to \u201Ctrip\u201D the drill pipe and lower the wireline tools down the wellbore,
        wireline tools are generally used only when the information is absolutely
        needed or when the drill string is tripped for another reason, such as changing
        the drill bit. Examples of wireline formation testers are described, for example,
        in U.S. Pat. Nos. 3,934,468; 4,860,581; 4,893,505; 4,936,139; and 5,622,223</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0008\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">MWD</span>\n
        \       <span itemprop=\"definition\">measurement-while-drilling</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0009\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">LWD</span>\n
        \       <span itemprop=\"definition\">logging-while-drilling</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0009\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">MWD</span>\n        <span
        itemprop=\"definition\">typically refers to measuring the drill bit trajectory
        as well as wellbore temperature and pressure</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0010\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">LWD</span>\n        <span itemprop=\"definition\">refers
        to measuring formation parameters or properties, such as resistivity, porosity,
        permeability, and sonic velocity, among others.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0010\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">Real-time data</span>\n        <span
        itemprop=\"definition\">such as the formation pressure, allows the drilling
        company to make decisions about drilling mud weight and composition, as well
        as decisions about drilling rate and weight-on-bit, during the drilling process.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0010\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">LWD
        and MWD</span>\n        <span itemprop=\"definition\">have different meanings
        to those of ordinary skill in the art, that distinction is not germane to
        this disclosure, and therefore this disclosure does not distinguish between
        the two terms.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0010\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">Formation evaluation</span>\n        <span itemprop=\"definition\">whether
        during a wireline operation or while drilling, often requires that fluid from
        the formation be drawn into a downhole tool for testing and/or sampling.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0011\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">Various
        sampling devices</span>\n        <span itemprop=\"definition\">typically referred
        to as probes, are extended from the downhole tool. to establish fluid communication
        with the formation surrounding the wellbore and to draw fluid into the downhole
        tool.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0011\">\n      </li>\n
        \     <li itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">a
        typical probe</span>\n        <span itemprop=\"definition\">is a circular
        element extended from the downhole tool and positioned against the sidewall
        of the wellbore.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0011\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">a rubber packer at the end of the probe</span>\n        <span
        itemprop=\"definition\">is used to create a seal with the wellbore sidewall.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0011\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">Another
        device used to form a seal with the wellbore sidewall</span>\n        <span
        itemprop=\"definition\">is referred to as a dual packer. With a dual packer,
        two elastomeric rings expand radially about the tool to isolate a portion
        of the wellbore therebetween. The rings form a seal with the wellbore wall
        and permit fluid to be drawn into the isolated portion of the wellbore and
        into an inlet in the downhole tool.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0011\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the mudcake lining the wellbore</span>\n
        \       <span itemprop=\"definition\">is often useful in assisting the probe
        and/or dual packers in making the seal with the wellbore wall.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0012\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">fluid from the formation</span>\n
        \       <span itemprop=\"definition\">is drawn into the downhole tool through
        an inlet by lowering the pressure in the downhole tool.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0012\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">probes and/or packers
        used in downhole tools</span>\n        <span itemprop=\"definition\">are described
        in U.S. Pat. Nos. 6,301,959; 4,860,581; 4,936,139; 6,585,045; 6,609,568 and
        6,719,049 and U. S. Patent Application Publication No. 2004/0000433.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0012\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">Reservoir
        evaluation</span>\n        <span itemprop=\"definition\">can be performed
        on fluids drawn into the downhole tool while the tool remains downhole.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0013\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">various
        contaminants</span>\n        <span itemprop=\"definition\">such as wellbore
        fluids and/or drilling mud primarily in the form of mud filtrate from the
        \u201Cinvaded zone\u201D of the formation, may enter the tool with the formation
        fluids.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0013\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the invaded zone</span>\n        <span itemprop=\"definition\">is
        the portion of the formation radially beyond the mudcake layer lining the
        wellbore where mud filtrate has penetrated the formation leaving the mudcake
        layer behind.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0013\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">These mud filtrate contaminates</span>\n        <span
        itemprop=\"definition\">may affect the quality of measurements and/or samples
        of the formation fluids.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0013\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">contamination</span>\n        <span itemprop=\"definition\">may
        cause costly delays in the wellbore operations by requiring additional time
        for obtaining test results and/or samples representative of the formation
        fluid. Additionally, such problems may yield false results that are erroneous
        and/or unusable. Thus, it is desirable that the formation fluid entering into
        the downhole tool be sufficiently \u2018clean\u2019 or \u2018virgin\u2019
        for valid testing. In other words, the formation fluid should have little
        or no contamination.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0013\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the measuring apparatus</span>\n        <span itemprop=\"definition\">is
        exposed to the extreme forces present during drilling operations. Any apparatus
        extending transversely through the wall of a drill string structure, such
        as a probe, will also weaken that structure. Thus, it is desirable to design
        probe apparatus so that it not only minimizes and/or withstands the while-drilling
        forces, but also minimizes any structural weaknesses in the drill string caused
        by the presence of the probe apparatus.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0016\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">a fluid sampling system</span>\n
        \       <span itemprop=\"definition\">for retrieving a formation fluid sample
        from a formation surrounding a wellbore extending along a wellbore axis, the
        formation having a virgin fluid and a contaminated fluid therein.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0017\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        system</span>\n        <span itemprop=\"definition\">includes a sample inlet,
        a first guard inlet positioned adjacent to the sample inlet and spaced from
        the sample inlet in a first direction along the wellbore axis, and a second
        guard inlet positioned adjacent to the sample inlet and spaced from the sample
        inlet in a second, opposite direction along the wellbore axis.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0017\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">At least one cleanup
        flowline</span>\n        <span itemprop=\"definition\">is fluidly connected
        to the first and second guard inlets for passing contaminated fluid</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0017\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">an
        evaluation flowline</span>\n        <span itemprop=\"definition\">is fluidly
        connected to the sample inlet for collecting virgin fluid.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0017\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">the sample inlet</span>\n
        \       <span itemprop=\"definition\">is provided on a sample probe assembly
        including a sample inlet extension mechanism</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0018\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the first guard inlet</span>\n
        \       <span itemprop=\"definition\">is provided on a first guard probe assembly
        including a first guard inlet extension mechanism</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0018\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the second guard inlet</span>\n
        \       <span itemprop=\"definition\">is provided on a second guard probe
        assembly including a second guard inlet extension mechanism, wherein the sample
        inlet, first guard inlet, and second guard inlet extension mechanisms are
        operable independently of one another.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0018\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the sample probe assembly</span>\n
        \       <span itemprop=\"definition\">includes a sample inlet packer completely
        surrounding an outer periphery of the sample inlet</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0019\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the first guard probe assembly</span>\n
        \       <span itemprop=\"definition\">includes a first guard inlet packer
        completely surrounding an outer periphery of the first guard inlet</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0019\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        second guard probe assembly</span>\n        <span itemprop=\"definition\">includes
        a second guard inlet packer completely surrounding an outer periphery of the
        second guard inlet.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0019\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">sample inlet packer, first guard inlet packer, and second
        guard inlet packer</span>\n        <span itemprop=\"definition\">are formed
        as segments of a composite packer having a substantially contiguous outer
        periphery.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0020\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the sample probe assembly, first guard probe assembly,
        and second guard probe assembly</span>\n        <span itemprop=\"definition\">are
        provided on a stabilizing blade of a drilling tool.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0021\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">the sample inlet, first
        guard inlet, and second guard inlet</span>\n        <span itemprop=\"definition\">are
        integrally provided on a single probe assembly including an inlet extension
        mechanism.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0022\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the inlet packer</span>\n        <span itemprop=\"definition\">includes
        a first packer segment disposed between the sample inlet and the first guard
        inlet and a second packer segment disposed between the sample inlet and the
        second guard inlet.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0023\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">first and second packer segments</span>\n        <span
        itemprop=\"definition\">further comprise a reinforcement material.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0024\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">an
        exterior face of the inlet packer</span>\n        <span itemprop=\"definition\">includes
        a guard channel.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0025\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">system</span>\n        <span itemprop=\"definition\">is
        associated with a wireline tool.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0026\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">system</span>\n        <span itemprop=\"definition\">is
        associated with a drilling tool.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0027\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">a probe assembly</span>\n        <span
        itemprop=\"definition\">is also disclosed for use with a fluid sampling system
        to retrieve a formation fluid sample from a formation surrounding a wellbore
        extending along a wellbore axis, the formation having a virgin fluid and a
        contaminated fluid therein.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0028\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the probe assembly</span>\n        <span itemprop=\"definition\">includes
        an inlet extension mechanism and a sample inlet coupled to the inlet extension
        mechanism.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0028\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">a first guard inlet</span>\n        <span itemprop=\"definition\">is
        coupled to the inlet extension mechanism, the first guard inlet being positioned
        adjacent to the sample inlet and spaced from the sample inlet in a first direction
        parallel to the wellbore axis.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0028\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">a second guard inlet</span>\n
        \       <span itemprop=\"definition\">is coupled to the inlet extension mechanism,
        the second guard inlet being positioned adjacent to the sample inlet and spaced
        from the sample inlet in a second, opposite direction parallel to the wellbore
        axis.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0028\">\n      </li>\n
        \     <li itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">An
        inlet packer</span>\n        <span itemprop=\"definition\">completely surrounds
        outer peripheries of the sample inlet, first guard inlet, and second guard
        inlet.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0028\">\n      </li>\n
        \     <li itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        probe packer</span>\n        <span itemprop=\"definition\">includes a first
        packer segment disposed between the sample probe and the first guard probe
        and a second packer segment disposed between the sample probe and the second
        guard probe, wherein the first and second packer segments further comprise
        a reinforcement material.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0029\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">an exterior face of the probe packer</span>\n        <span
        itemprop=\"definition\">includes a guard channel.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0030\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the guard channel</span>\n        <span
        itemprop=\"definition\">includes a central ring section completely surrounding
        an outer periphery of the sample probe, a first guard ring section completely
        surrounding an outer periphery of the first guard probe, a second guard ring
        section completely surrounding an outer periphery of the second guard probe,
        a first link section extending between the central ring section and the first
        guard ring section, and a second link section extending between the central
        ring section and the second guard ring section.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0031\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the guard channel</span>\n        <span
        itemprop=\"definition\">includes a guard ring section completely surrounding
        an outer periphery of the first guard probe and at least a first wing section
        connected to and extending away from the guard ring section.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0032\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">the guard channel</span>\n
        \       <span itemprop=\"definition\">further includes a second wing section
        connecting to and extending away from the guard ring section.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0033\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">a second guard channel</span>\n
        \       <span itemprop=\"definition\">having a guard ring section completely
        surrounding an outer periphery of the second guard probe and at least a first
        wing section connected to and extending away from the guard ring section.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0034\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        guard channel</span>\n        <span itemprop=\"definition\">is defined by
        a channel insert coupled to the probe packer.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0035\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the channel insert</span>\n        <span
        itemprop=\"definition\">is mechanically coupled to the probe packer.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0036\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">sample
        inlet, first guard inlet, and second guard inlet</span>\n        <span itemprop=\"definition\">are
        pivotably coupled to the inlet extension mechanism.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0037\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">a downhole tool</span>\n
        \       <span itemprop=\"definition\">is disclosed that is connected to a
        drill string positioned in a wellbore penetrating a subterranean formation
        along a wellbore axis.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0038\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the tool</span>\n        <span itemprop=\"definition\">includes
        a drilling collar having at least one stabilizing blade defining a blade axis,
        an inlet extension mechanism housed within the stabilizing blade, and a probe
        assembly coupled to the inlet extension mechanism.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0038\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the probe assembly</span>\n        <span
        itemprop=\"definition\">comprises a sample inlet having a mouth portion with
        a first profile dimension in a direction parallel to the blade axis and a
        second profile dimension in a direction perpendicular to the blade axis, in
        which the first profile dimension is greater than the second profile dimension.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0038\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">An
        inner packer</span>\n        <span itemprop=\"definition\">completely surrounds
        an outer periphery of the sample inlet</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0038\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">a guard inlet</span>\n        <span
        itemprop=\"definition\">extends completely around an outer periphery of the
        inner packer</span>\n        <meta itemprop=\"num_attr\" content=\"p-0038\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">an outer packer</span>\n        <span itemprop=\"definition\">completely
        surrounds an outer periphery of the guard inlet</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0038\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the probe assembly</span>\n        <span
        itemprop=\"definition\">is pivotably coupled to the inlet extension Mechanism.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0039\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        mouth portion</span>\n        <span itemprop=\"definition\">has a generally
        oval shape cross-sectional profile, with the first profile dimension comprising
        a major axis and the second profile dimension comprising a minor axis.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0040\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        second profile dimension</span>\n        <span itemprop=\"definition\">is
        less than approximately 3.5 inches.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0041\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">FIG. 1</span>\n        <span itemprop=\"definition\">is
        a schematic view, partially in cross-section, of a downhole tool with a probe
        assembly according to the present disclosure, in which the downhole tool is
        a downhole drilling tool;</span>\n        <meta itemprop=\"num_attr\" content=\"p-0043\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">FIG. 2</span>\n        <span itemprop=\"definition\">is
        a schematic view, partially in cross-section, of a downhole tool with a probe
        assembly according to the present disclosure, in which the downhole tool is
        a wireline tool;</span>\n        <meta itemprop=\"num_attr\" content=\"p-0044\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">FIG. 3</span>\n        <span itemprop=\"definition\">illustrates
        one embodiment of a formation fluid sampling system made in accordance with
        this disclosure</span>\n        <meta itemprop=\"num_attr\" content=\"p-0045\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">FIG. 4</span>\n        <span itemprop=\"definition\">is
        a schematic sectional view of the formation fluid sampling system of FIG.
