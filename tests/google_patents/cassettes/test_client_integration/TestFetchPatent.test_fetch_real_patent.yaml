        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">This disclosure</span>\n        <span itemprop=\"definition\">relates
        to probe assemblies and configurations described below that may be used with
        a downhole tool, either in a drilling environment or in a wireline environment.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0061\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        apparatus and methods disclosed herein</span>\n        <span itemprop=\"definition\">reduce
        the contamination of formation fluid samples.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0061\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">this disclosure</span>\n        <span
        itemprop=\"definition\">relates to the relative positioning of multiple, independently
        operable probe assemblies.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0061\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">a fluid sampling system</span>\n        <span itemprop=\"definition\">includes
        a single assembly having multiple probes.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0061\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">a probe configuration particularly
        suited to while-drilling applications</span>\n        <span itemprop=\"definition\">is
        disclosed.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0061\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">formation evaluation while drilling</span>\n        <span
        itemprop=\"definition\">refers to various sampling and testing operations
        that may be performed during the drilling process, such as sample collection,
        fluid pump out, pretests, pressure tests, fluid analysis, and resistivity
        tests, among others. It is noted that \u201Cformation evaluation while drilling\u201D
        does not necessarily mean that the measurements are made while the drill bit
        is actually cutting through the formation. For example, sample collection
        and pump out are usually performed during brief stops in the drilling process.
        That is, the rotation of the drill bit is briefly stopped so that the measurements
        may be made. Drilling may continue once the measurements are made. Even in
        embodiments where measurements are only made after drilling is stopped, the
        measurements may still be made without having to trip the drill string.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0062\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">a
        probe assembly according to the present disclosure</span>\n        <span itemprop=\"definition\">is
        carried by a downhole tool, such as the drilling tool 10 of FIG. 1 or the
        wireline tool 10 \u2032 of FIG. 2 .</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0063\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the probe assembly</span>\n        <span
        itemprop=\"definition\">may also be used in other downhole tools adapted to
        draw fluid therein, such as coiled tubing, casing drilling, and other variations
        of downhole tools.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0063\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">FIG. 1</span>\n        <span itemprop=\"definition\">depicts
        a downhole drilling tool 10 deployed from a rig 5 and advanced into the earth
        to form a wellbore 14 .</span>\n        <meta itemprop=\"num_attr\" content=\"p-0064\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the wellbore</span>\n        <span itemprop=\"definition\">penetrates
        a subterranean formation F containing a formation fluid 21 .</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0064\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">the downhole drilling
        tool</span>\n        <span itemprop=\"definition\">is suspended from the drilling
        rig by one or more drill collars 11 that form a drill string 28 .</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0064\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">\u201CMud\u201D</span>\n
        \       <span itemprop=\"definition\">is pumped through the drill string 28
        and out bit 30 of the drilling tool 10 .</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0064\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the mud</span>\n        <span
        itemprop=\"definition\">is pumped back up through the wellbore and to the
        surface for filtering and recirculation. As the mud passes through the wellbore,
        it forms a mud layer or mudcake 15 along the wellbore wall 17 . A portion
        of the mud infiltrates the formation to form an invaded zone 25 of the formation
        F.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0064\">\n      </li>\n
        \     <li itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        drilling tool 10</span>\n        <span itemprop=\"definition\">is provided
        with a probe 26 for establishing fluid communication with the formation F
        and drawing the fluid 21 into the downhole tool, as indicated by the arrows.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0065\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        probe</span>\n        <span itemprop=\"definition\">is positioned in a stabilizer
        blade 23 of the drilling tool and extended therefrom to engage the wellbore
        wall.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0065\">\n      </li>\n
        \     <li itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        stabilizer blade 23</span>\n        <span itemprop=\"definition\">comprises
        one or more blades that are in contact with the wellbore wall to limit \u201Cwobble\u201D
        of the drill bit 30 .</span>\n        <meta itemprop=\"num_attr\" content=\"p-0065\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">\u201CWobble\u201D</span>\n        <span itemprop=\"definition\">is
        the tendency of the drill string, as it rotates, to deviate from the axis
        of the wellbore 14 and cause the drill bit to change direction.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0065\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">a stabilizer blade 23</span>\n
        \       <span itemprop=\"definition\">is already in contact with the wellbore
        wall, thus requiring less extension of a probe to establish fluid communication
        with the formation fluids if the probe is disposed in the stabilizer blade
        23 .</span>\n        <meta itemprop=\"num_attr\" content=\"p-0065\">\n      </li>\n
        \     <li itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">Fluid
        drawn into the downhole tool using the probe 26</span>\n        <span itemprop=\"definition\">may
        be measured to determine, for example, pretest and/or pressure parameters.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0066\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        downhole tool</span>\n        <span itemprop=\"definition\">may be provided
        with devices, such as sample chambers, for collecting fluid samples for retrieval
        at the surface.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0066\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">Backup pistons 8</span>\n        <span itemprop=\"definition\">may
        also be provided to assist in applying force to push the drilling tool and/or
        probe against the wellbore wall.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0066\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the drilling tool</span>\n        <span
        itemprop=\"definition\">may be of a variety of chilling tools, such as Measurement-While-Drilling
        (\u201CMWD\u201D), Logging-While-Drilling (\u201CLWD\u201D), casing drilling,
        or other system.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0066\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">MWD</span>\n        <span itemprop=\"definition\">Measurement-While-Drilling</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0066\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">LWD</span>\n
        \       <span itemprop=\"definition\">Logging-While-Drilling</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0066\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">casing drilling</span>\n
        \       <span itemprop=\"definition\">or other system.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0066\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">the downhole drilling
        tool 10</span>\n        <span itemprop=\"definition\">may be removed from
        the wellbore and a wireline tool 10 \u2032 ( FIG. 2 ) may be lowered into
        the wellbore via a wireline cable 18 .</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0067\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">a wireline tool 10 \u2032</span>\n
        \       <span itemprop=\"definition\">FIG. 2</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0067\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">An example of a wireline tool
        capable of sampling and/or testing</span>\n        <span itemprop=\"definition\">is
        depicted in U.S. Pat. Nos. 4,936,139 and 4,860,581, the entire contents of
        which are hereby incorporated by reference.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0067\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the downhole tool 10 \u2032</span>\n
        \       <span itemprop=\"definition\">is deployable into borehole 14 and suspended
        therein with a conventional wireline 18 , or conductor or conventional tubing
        or coiled tubing, below the rig 5 .</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0067\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the illustrated tool 10 \u2032</span>\n
        \       <span itemprop=\"definition\">is provided with various modules and/or
        components 12 including, but not limited to, a probe 26 \u2032 for establishing
        fluid communication with the formation F and drawing the fluid 21 into the
        downhole tool as shown by the arrows.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0067\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">Backup pistons 8</span>\n        <span
        itemprop=\"definition\">may be provided to further thrust the downhole tool
        against the wellbore wall and assist the probe in engaging the wellbore wall</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0067\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        tools of FIGS. 1 and 2</span>\n        <span itemprop=\"definition\">may be
        modular as shown in FIG. 2 or unitary as shown in FIG. 1 , or combinations
        thereof.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0067\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">a probe assembly 30</span>\n        <span itemprop=\"definition\">is
        recessed within a stabilizing blade 32 of a drill collar 34 .</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0068\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">the probe assembly 30</span>\n
        \       <span itemprop=\"definition\">includes a sample inlet 36 , a first
        guard inlet 38 , and a second guard inlet 40 .</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0068\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">Each of the inlets 36 , 38 , 40</span>\n
        \       <span itemprop=\"definition\">is oriented generally transversely to
        a longitudinal axis of the drill collar 34 and is normally in a retracted
        position so that the inlets 36 , 38 , 40 are housed within one or more cavities
        formed in the stabilizing blade 32 .</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0068\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">a dedicated probe extension mechanism</span>\n
        \       <span itemprop=\"definition\">such as a hydraulic arm as described
        in U.S. Pat. Nos.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0068\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the probe assembly 30</span>\n        <span itemprop=\"definition\">may
        include a protector which provides mechanical protection to the inlets during
        drilling and/or tripping operations and which provides mechanical protection
        to the mudcake against erosion generated by flowing mud.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0069\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">a protector</span>\n
        \       <span itemprop=\"definition\">which provides mechanical protection
        to the inlets during drilling and/or tripping operations and which provides
        mechanical protection to the mudcake against erosion generated by flowing
        mud.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0069\">\n      </li>\n
        \     <li itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">One
        such protector</span>\n        <span itemprop=\"definition\">is described
        in U.S. Pat. No. 6,729,399 commonly assigned to the assignee of the present
        application, the entire contents of which are hereby incorporated by reference.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0069\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">sample
        inlet 36</span>\n        <span itemprop=\"definition\">is fluidly connected
        to an evaluation flowline 52 by an inlet flowline 54 a .</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0070\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">a bypass flowline 56
        a</span>\n        <span itemprop=\"definition\">fluidly communicates between
        the sample probe 38 and a clean up flowline 58 .</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0070\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the first guard inlet 38</span>\n
        \       <span itemprop=\"definition\">is also fluidly connected to the evaluation
        and clean up flowlines 52 , 58 by an inlet flowline 54 b and a bypass flowline
        56 b , respectively.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0070\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the second guard inlet 40</span>\n        <span itemprop=\"definition\">is
        in fluid communication with the evaluation and clean up flowlines 52 , 58
        by an inlet flowline 54 c and a bypass flowline 56 c .</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0070\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">Valves 60 a - f</span>\n
        \       <span itemprop=\"definition\">are provided in the inlet and bypass
        flowlines 54 , 56 to direct fluid flow to the evaluation and clean up flowlines
        52 , 58 , as desired.</span>\n        <meta itemprop=\"num_attr\" content=\"p-0070\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">Fluid sensors</span>\n        <span itemprop=\"definition\">such
        as optical fluid analyzers 46 a , 46 b , are associated with the flowlines
        52 , 58 to provide feedback regarding characteristics or other information
        regarding the fluid passing through the flowlines.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0070\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">a pump 62</span>\n        <span
        itemprop=\"definition\">is fluidly coupled to the evaluation and clean up
        flowlines 52 , 58 .</span>\n        <meta itemprop=\"num_attr\" content=\"p-0071\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">a sample storage assembly</span>\n        <span itemprop=\"definition\">(not
        shown) may fluidly communicate with the evaluation flowline 52 upstream of
        the point where the evaluation flowline 52 and clean up flowline 58 are connected,
        to provide means for collecting a clean fluid sample.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0071\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">a pump discharge flowline
        64</span>\n        <span itemprop=\"definition\">may communicate between the
        pump and the wellbore 14 for discharging contaminated formation fluid.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0071\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        pump 62 and valves 60 a - f</span>\n        <span itemprop=\"definition\">may
        be operated in various manners to clear contaminated formation fluid from
        the immediate area of the probes 36 , 38 , 40 and to draw clean formation
        fluid into the evaluation flowline 52 , such as the methods disclosed in U.S.
        Patent Application Publication No. 2006-0042793, the entire contents of which
        are hereby incorporated by Reference.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0071\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">Each of the inlets 36 , 38 , 40
        of the probe assembly 30</span>\n        <span itemprop=\"definition\">includes
        a packer for sealing with the wellbore wall 17 .</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0072\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">a sample inlet packer 80</span>\n
        \       <span itemprop=\"definition\">is provided that completely surrounds
        an outer periphery of the sample inlet 36 .</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0072\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">first and second guard inlet packers
        82 , 84</span>\n        <span itemprop=\"definition\">completely surround
        outer peripheries of the first and second guard inlets 38 , 40 , respectively.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0072\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        inlets 36 , 38 , 40</span>\n        <span itemprop=\"definition\">are positioned
        relative to one another to reduce the amount of contaminants that reach the
        sample inlet 36 .</span>\n        <meta itemprop=\"num_attr\" content=\"p-0073\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the first guard inlet 38</span>\n        <span itemprop=\"definition\">is
        positioned adjacent to and above the sample inlet 36 while the second guard
        inlet 40 is positioned adjacent to and below the sample inlet 36 .</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0073\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">This
        arrangement of inlets</span>\n        <span itemprop=\"definition\">minimizes
        or prevents fluid from the invaded zone from entering the sample inlet 36
        .</span>\n        <meta itemprop=\"num_attr\" content=\"p-0073\">\n      </li>\n
        \     <li itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">the
        invaded zone 25</span>\n        <span itemprop=\"definition\">is the area
        where mud filtrate has entered the formation F radially from the wellbore
        14 , leaving a layer of mudcake lining the wellbore wall 17 .</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0073\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">the first and second
        guard inlets 38 , 40</span>\n        <span itemprop=\"definition\">prevent
        mud filtrate and contaminated fluid from migrating axially toward the sample
        inlet 36 .</span>\n        <meta itemprop=\"num_attr\" content=\"p-0073\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">the sample inlet 36</span>\n        <span itemprop=\"definition\">retrieves
        formation fluid having little or no filtrate contamination.</span>\n        <meta
        itemprop=\"num_attr\" content=\"p-0073\">\n      </li>\n      <li itemprop=\"definitions\"
        itemscope repeat>\n        <span itemprop=\"subject\">each inlet 36 , 38 ,
        40</span>\n        <span itemprop=\"definition\">requires an aperture to be
        formed through an exterior of the drilling tool.</span>\n        <meta itemprop=\"num_attr\"
        content=\"p-0074\">\n      </li>\n      <li itemprop=\"definitions\" itemscope
        repeat>\n        <span itemprop=\"subject\">the drill collar carrying the
        probe assembly</span>\n        <span itemprop=\"definition\">must be structurally
        sound to withstand the forces experienced during drilling operations.</span>\n
        \       <meta itemprop=\"num_attr\" content=\"p-0074\">\n      </li>\n      <li
        itemprop=\"definitions\" itemscope repeat>\n        <span itemprop=\"subject\">farther
        spaced inlets 36 , 38 , 40</span>\n        <span itemprop=\"definition\">reduce
