        itemprop=\"definition\">is an enlarged plan view of the formation fluid sampling
        system of FIG. 15 ;</span>\n        <meta itemprop=\"num_attr\" content=\"p-0057\">\n
        \     </li>\n      <li itemprop=\"definitions\" itemscope repeat>\n        <span
        itemprop=\"subject\">FIGS. 17A and 17B</span>\n        <span itemprop=\"definition\">are
        schematic illustrations of a formation fluid sampling system having a pivotable
