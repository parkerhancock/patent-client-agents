        itemscope>\n    <h2>Abstract</h2>\n    \n    <div itemprop=\"content\" html><abstract
        mxw-id=\"PA73329270\" lang=\"EN\" load-source=\"patent-office\">\n    <div
        num=\"p-0001\" class=\"abstract\">A fluid sampling system retrieves a formation
        fluid sample from a formation surrounding a wellbore extending along a wellbore
        axis, wherein the formation has a virgin fluid and a contaminated fluid therein.
        The system includes a sample inlet, a first guard inlet positioned adjacent
        to the sample inlet and spaced from the sample inlet in a first direction
        along the wellbore axis, and a second guard inlet positioned adjacent to the
        sample inlet and spaced from the sample inlet in a second, opposite direction
        along the wellbore axis. At least one cleanup flowline is fluidly connected
        to the first and second guard inlets for passing contaminated fluid, and an
        evaluation flowline is fluidly connected to the sample inlet for collecting
        virgin fluid.</div>\n  </abstract>\n  </div>\n  </section>\n\n  <section itemprop=\"description\"
        itemscope>\n    <h2>Description</h2>\n    \n    <div itemprop=\"content\"
        html><div mxw-id=\"PDES35448624\" lang=\"EN\" load-source=\"patent-office\"
        class=\"description\">\n\n  <heading>BACKGROUND</heading>\n  <div num=\"p-0002\"
        class=\"description-paragraph\">1. Technical Field</div>\n  <div num=\"p-0003\"
        class=\"description-paragraph\">This disclosure generally relates to investigations
        of subterranean formations, and more particularly to apparatus and methods
        for reducing the contamination of formation fluids drawn into a downhole formation
        testing and sampling tool.</div>\n  <div num=\"p-0004\" class=\"description-paragraph\">2.
        Description of the Related Art</div>\n  <div num=\"p-0005\" class=\"description-paragraph\">Wells
        are generally drilled into the ground or ocean bed to recover natural deposits
        of oil and gas, as well as other desirable materials that are trapped in geological
        formations in the Earth&#39;s crust. A well is typically drilled using a drill
        bit attached to the lower end of a \u201Cdrill string\u201D Drilling fluid,
        or \u201Cmud,\u201D is typically pumped down through the drill string to the
        drill bit. The drilling fluid lubricates and cools the drill bit, and it carries
        drill cuttings back to the surface in the annulus between the drill string
        and the wellbore wall.</div>\n  <div num=\"p-0006\" class=\"description-paragraph\">For
        successful oil and gas exploration, it is necessary to have information about
        the subsurface formations that are penetrated by a wellbore. For example,
        one aspect of standard formation evaluation relates to the measurements of
        the formation pressure and formation permeability. These measurements are
        essential to predicting the production capacity and production lifetime of
        a subsurface formation.</div>\n  <div num=\"p-0007\" class=\"description-paragraph\">One
        technique for measuring formation and fluid properties includes lowering a
        \u201Cwireline\u201D tool into the well to measure formation properties. A
        wireline tool is a measurement tool that is suspended from a wireline in electrical
        communication with a control system disposed on the surface. The tool is lowered
        into a well so that it can measure formation properties at desired depths.
        A typical wireline tool may include a probe that may be pressed against the
        wellbore wall to establish fluid communication with the formation. This type
        of wireline tool is often called a \u201Cformation tester.\u201D Using the
        probe, a formation tester measures the pressure of the formation fluids, generates
        a pressure pulse, which is used to determine the formation permeability. The
        formation tester tool also typically withdraws a sample of the formation fluid
        that is either subsequently transported to the surface fox analysis or analyzed
        downhole.</div>\n  <div num=\"p-0008\" class=\"description-paragraph\">In
        order to use any wireline tool, whether the tool be a resistivity, porosity
        or formation testing tool, the drill string must be removed from the well
        so that the tool can be lowered into the well. This is called a \u201Ctrip\u201D
        uphole. Further, the wireline tools must be lowered to the zone of interest,
        generally at or near the bottom of the hole. A combination of removing the
        drill string and lowering the wireline tools downhole are time-consuming measures
        and can take up to several hours, depending upon the depth of the wellbore.
        Because of the great expense and rig time required to \u201Ctrip\u201D the
        drill pipe and lower the wireline tools down the wellbore, wireline tools
        are generally used only when the information is absolutely needed or when
        the drill string is tripped for another reason, such as changing the drill
        bit. Examples of wireline formation testers are described, for example, in
        U.S. Pat. Nos. 3,934,468; 4,860,581; 4,893,505; 4,936,139; and 5,622,223</div>\n
        \ <div num=\"p-0009\" class=\"description-paragraph\">To avoid or minimize
        the downtime associated with tripping the drill string, another technique
        for measuring formation properties has been developed in which tools and devices
        are positioned near the drill bit in a drilling system. Thus, formation measurements
        are made during the drilling process and the terminology generally used in
        the art is \u201CMWD\u201D (measurement-while-drilling) and \u201CLWD\u201D
        (logging-while-drilling). A variety of downhole MWD and LWD drilling tools
        are commercially available.</div>\n  <div num=\"p-0010\" class=\"description-paragraph\">MWD
        typically refers to measuring the drill bit trajectory as well as wellbore
        temperature and pressure, while LWD refers to measuring formation parameters
        or properties, such as resistivity, porosity, permeability, and sonic velocity,
        among others. Real-time data, such as the formation pressure, allows the drilling
        company to make decisions about drilling mud weight and composition, as well
        as decisions about drilling rate and weight-on-bit, during the drilling process.
        While LWD and MWD have different meanings to those of ordinary skill in the
        art, that distinction is not germane to this disclosure, and therefore this
        disclosure does not distinguish between the two terms.</div>\n  <div num=\"p-0011\"
        class=\"description-paragraph\">Formation evaluation, whether during a wireline
        operation or while drilling, often requires that fluid from the formation
        be drawn into a downhole tool for testing and/or sampling. Various sampling
        devices, typically referred to as probes, are extended from the downhole tool.
        to establish fluid communication with the formation surrounding the wellbore
        and to draw fluid into the downhole tool. A typical probe is a circular element
        extended from the downhole tool and positioned against the sidewall of the
        wellbore. A rubber packer at the end of the probe is used to create a seal
        with the wellbore sidewall. Another device used to form a seal with the wellbore
        sidewall is referred to as a dual packer. With a dual packer, two elastomeric
        rings expand radially about the tool to isolate a portion of the wellbore
        therebetween. The rings form a seal with the wellbore wall and permit fluid
        to be drawn into the isolated portion of the wellbore and into an inlet in
        the downhole tool.</div>\n  <div num=\"p-0012\" class=\"description-paragraph\">The
        mudcake lining the wellbore is often useful in assisting the probe and/or
        dual packers in making the seal with the wellbore wall. Once the seal is made,
        fluid from the formation is drawn into the downhole tool through an inlet
        by lowering the pressure in the downhole tool. Examples of probes and/or packers
        used in downhole tools are described in U.S. Pat. Nos. 6,301,959; 4,860,581;
        4,936,139; 6,585,045; 6,609,568 and 6,719,049 and U. S. Patent Application
        Publication No. 2004/0000433.</div>\n  <div num=\"p-0013\" class=\"description-paragraph\">Reservoir
        evaluation can be performed on fluids drawn into the downhole tool while the
        tool remains downhole. Techniques currently exist for performing various measurements,
        pretests and/or sample collection of fluids that enter the downhole tool.
        However, it has been discovered that when the formation fluid passes into
        the downhole tool, various contaminants, such as wellbore fluids and/or drilling
        mud primarily in the form of mud filtrate from the \u201Cinvaded zone\u201D
        of the formation, may enter the tool with the formation fluids. The invaded
        zone is the portion of the formation radially beyond the mudcake layer lining
        the wellbore where mud filtrate has penetrated the formation leaving the mudcake
        layer behind. These mud filtrate contaminates may affect the quality of measurements
        and/or samples of the formation fluids. Moreover, contamination may cause
        costly delays in the wellbore operations by requiring additional time for
        obtaining test results and/or samples representative of the formation fluid.
        Additionally, such problems may yield false results that are erroneous and/or
        unusable. Thus, it is desirable that the formation fluid entering into the
        downhole tool be sufficiently \u2018clean\u2019 or \u2018virgin\u2019 for
        valid testing. In other words, the formation fluid should have little or no
        contamination.</div>\n  <div num=\"p-0014\" class=\"description-paragraph\">Attempts
        have been made to eliminate contaminates from entering the downhole tool with
        the formation fluid. For example, as depicted in U.S. Pat. No. 4,951,749,
        filters have been positioned in probes to block contaminates from entering
        the downhole tool with the formation fluid. Additionally, as shown in U.S.
        Pat. No. 6,301,959, a probe is provided with a guard ring to divert contaminated
        fluids away from clean fluid as it enters the probe. More recently, U.S. Patent
        Application Publication No. 2006/0042793 discloses a central sample probe
        with an annular \u201Cguard\u201D probe extending about an outer periphery
        of the sample probe, in an effort to divert contaminated fluids away from
        the sample probe.</div>\n  <div num=\"p-0015\" class=\"description-paragraph\">Despite
        the existence of techniques for performing formation evaluation and for attempting
        to deal with contamination, there remains a need to manipulate the flow of
        fluids through the downhole tool to reduce contamination as it enters and/or
        passes through the downhole tool. It is desirable that such techniques are
        capable of diverting contaminants away from clean fluid.</div>\n  <div num=\"p-0016\"
        class=\"description-paragraph\">Additionally, in while-drilling applications,
        the measuring apparatus is exposed to the extreme forces present during drilling
        operations. Any apparatus extending transversely through the wall of a drill
        string structure, such as a probe, will also weaken that structure. Thus,
        it is desirable to design probe apparatus so that it not only minimizes and/or
        withstands the while-drilling forces, but also minimizes any structural weaknesses
        in the drill string caused by the presence of the probe apparatus.</div>\n
        \ <heading>SUMMARY OF THE DISCLOSURE</heading>\n  <div num=\"p-0017\" class=\"description-paragraph\">A
        fluid sampling system is provided for retrieving a formation fluid sample
        from a formation surrounding a wellbore extending along a wellbore axis, the
        formation having a virgin fluid and a contaminated fluid therein. The system
        includes a sample inlet, a first guard inlet positioned adjacent to the sample
        inlet and spaced from the sample inlet in a first direction along the wellbore
        axis, and a second guard inlet positioned adjacent to the sample inlet and
        spaced from the sample inlet in a second, opposite direction along the wellbore
        axis. At least one cleanup flowline is fluidly connected to the first and
        second guard inlets for passing contaminated fluid, and an evaluation flowline
        is fluidly connected to the sample inlet for collecting virgin fluid.</div>\n
        \ <div num=\"p-0018\" class=\"description-paragraph\">In a refinement, the
        sample inlet is provided on a sample probe assembly including a sample inlet
        extension mechanism, the first guard inlet is provided on a first guard probe
        assembly including a first guard inlet extension mechanism, and the second
        guard inlet is provided on a second guard probe assembly including a second
        guard inlet extension mechanism, wherein the sample inlet, first guard inlet,
        and second guard inlet extension mechanisms are operable independently of
        one another.</div>\n  <div num=\"p-0019\" class=\"description-paragraph\">In
        a related refinement, the sample probe assembly includes a sample inlet packer
        completely surrounding an outer periphery of the sample inlet, the first guard
        probe assembly includes a first guard inlet packer completely surrounding
        an outer periphery of the first guard inlet, and the second guard probe assembly
        includes a second guard inlet packer completely surrounding an outer periphery
        of the second guard inlet.</div>\n  <div num=\"p-0020\" class=\"description-paragraph\">In
        a further refinement, the sample inlet packer, first guard inlet packer, and
        second guard inlet packer are formed as segments of a composite packer having
        a substantially contiguous outer periphery.</div>\n  <div num=\"p-0021\" class=\"description-paragraph\">In
        a refinement, the sample probe assembly, first guard probe assembly, and second
        guard probe assembly are provided on a stabilizing blade of a drilling tool.</div>\n
        \ <div num=\"p-0022\" class=\"description-paragraph\">In yet another refinement,
        the sample inlet, first guard inlet, and second guard inlet are integrally
        provided on a single probe assembly including an inlet extension mechanism.</div>\n
        \ <div num=\"p-0023\" class=\"description-paragraph\">In still another refinement,
        the inlet packer includes a first packer segment disposed between the sample
        inlet and the first guard inlet and a second packer segment disposed between
        the sample inlet and the second guard inlet.</div>\n  <div num=\"p-0024\"
        class=\"description-paragraph\">In a related refinement, the first and second
        packer segments further comprise a reinforcement material.</div>\n  <div num=\"p-0025\"
        class=\"description-paragraph\">In a refinement, an exterior face of the inlet
        packer includes a guard channel.</div>\n  <div num=\"p-0026\" class=\"description-paragraph\">In
        a further refinement, the system is associated with a wireline tool.</div>\n
        \ <div num=\"p-0027\" class=\"description-paragraph\">In another refinement,
        the system is associated with a drilling tool.</div>\n  <div num=\"p-0028\"
        class=\"description-paragraph\">A probe assembly is also disclosed for use
        with a fluid sampling system to retrieve a formation fluid sample from a formation
        surrounding a wellbore extending along a wellbore axis, the formation having
        a virgin fluid and a contaminated fluid therein. The probe assembly includes
        an inlet extension mechanism and a sample inlet coupled to the inlet extension
        mechanism. A first guard inlet is coupled to the inlet extension mechanism,
        the first guard inlet being positioned adjacent to the sample inlet and spaced
        from the sample inlet in a first direction parallel to the wellbore axis.
        A second guard inlet is coupled to the inlet extension mechanism, the second
        guard inlet being positioned adjacent to the sample inlet and spaced from
        the sample inlet in a second, opposite direction parallel to the wellbore
        axis. An inlet packer completely surrounds outer peripheries of the sample
        inlet, first guard inlet, and second guard inlet.</div>\n  <div num=\"p-0029\"
        class=\"description-paragraph\">In a related refinement, the probe packer
        includes a first packer segment disposed between the sample probe and the
        first guard probe and a second packer segment disposed between the sample
        probe and the second guard probe, wherein the first and second packer segments
        further comprise a reinforcement material.</div>\n  <div num=\"p-0030\" class=\"description-paragraph\">In
        a further refinement, an exterior face of the probe packer includes a guard
        channel.</div>\n  <div num=\"p-0031\" class=\"description-paragraph\">In another
        refinement, the guard channel includes a central ring section completely surrounding
        an outer periphery of the sample probe, a first guard ring section completely
        surrounding an outer periphery of the first guard probe, a second guard ring
        section completely surrounding an outer periphery of the second guard probe,
        a first link section extending between the central ring section and the first
        guard ring section, and a second link section extending between the central
        ring section and the second guard ring section.</div>\n  <div num=\"p-0032\"
        class=\"description-paragraph\">In yet another refinement, the guard channel
        includes a guard ring section completely surrounding an outer periphery of
        the first guard probe and at least a first wing section connected to and extending
        away from the guard ring section.</div>\n  <div num=\"p-0033\" class=\"description-paragraph\">In
        still another refinement, the guard channel further includes a second wing
        section connecting to and extending away from the guard ring section.</div>\n
        \ <div num=\"p-0034\" class=\"description-paragraph\">In a refinement, a second
        guard channel is provided having a guard ring section completely surrounding
        an outer periphery of the second guard probe and at least a first wing section
        connected to and extending away from the guard ring section.</div>\n  <div
        num=\"p-0035\" class=\"description-paragraph\">In a related refinement, the
        guard channel is defined by a channel insert coupled to the probe packer.</div>\n
        \ <div num=\"p-0036\" class=\"description-paragraph\">In a further refinement,
        the channel insert is mechanically coupled to the probe packer.</div>\n  <div
        num=\"p-0037\" class=\"description-paragraph\">In yet another refinement,
        the sample inlet, first guard inlet, and second guard inlet are pivotably
        coupled to the inlet extension mechanism.</div>\n  <div num=\"p-0038\" class=\"description-paragraph\">A
        downhole tool is disclosed that is connected to a drill string positioned
        in a wellbore penetrating a subterranean formation along a wellbore axis.
        The tool includes a drilling collar having at least one stabilizing blade
        defining a blade axis, an inlet extension mechanism housed within the stabilizing
        blade, and a probe assembly coupled to the inlet extension mechanism. The
        probe assembly comprises a sample inlet having a mouth portion with a first
        profile dimension in a direction parallel to the blade axis and a second profile
        dimension in a direction perpendicular to the blade axis, in which the first
        profile dimension is greater than the second profile dimension. An inner packer
        completely surrounds an outer periphery of the sample inlet, a guard inlet
        extends completely around an outer periphery of the inner packer, and an outer
        packer completely surrounds an outer periphery of the guard inlet</div>\n
        \ <div num=\"p-0039\" class=\"description-paragraph\">In a refinement, the
        probe assembly is pivotably coupled to the inlet extension Mechanism.</div>\n
        \ <div num=\"p-0040\" class=\"description-paragraph\">In a further refinement,
        the mouth portion has a generally oval shape cross-sectional profile, with
        the first profile dimension comprising a major axis and the second profile
        dimension comprising a minor axis.</div>\n  <div num=\"p-0041\" class=\"description-paragraph\">In
        yet another refinement, the second profile dimension is less than approximately
        3.5 inches.</div>\n\n\n  <description-of-drawings>\n    <heading>BRIEF DESCRIPTION
        OF THE DRAWINGS</heading>\n    <div num=\"p-0042\" class=\"description-paragraph\">For
        a more complete understanding of the disclosed methods and apparatuses, reference
        should be made to the embodiment illustrated in greater detail on the accompanying
        drawings, wherein:</div>\n    <div num=\"p-0043\" class=\"description-paragraph\">
        <figref idrefs=\"DRAWINGS\">FIG. 1</figref> is a schematic view, partially
        in cross-section, of a downhole tool with a probe assembly according to the
        present disclosure, in which the downhole tool is a downhole drilling tool;</div>\n
        \   <div num=\"p-0044\" class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG.
        2</figref> is a schematic view, partially in cross-section, of a downhole
        tool with a probe assembly according to the present disclosure, in which the
        downhole tool is a wireline tool;</div>\n    <div num=\"p-0045\" class=\"description-paragraph\">
        <figref idrefs=\"DRAWINGS\">FIG. 3</figref> illustrates one embodiment of
        a formation fluid sampling system made in accordance with this disclosure;</div>\n
        \   <div num=\"p-0046\" class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG.
        4</figref> is a schematic sectional view of the formation fluid sampling system
        of <figref idrefs=\"DRAWINGS\">FIG. 3</figref>;</div>\n    <div num=\"p-0047\"
        class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIGS. 5 and 6</figref>
        schematically illustrate alternative probe arrangements for a formation fluid
        sampling system similar to that of <figref idrefs=\"DRAWINGS\">FIG. 3</figref>;</div>\n
        \   <div num=\"p-0048\" class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG.
        7</figref> illustrates an alternative formation fluid sampling systems;</div>\n
        \   <div num=\"p-0049\" class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG.
        8</figref> schematically illustrates fluid flow during use of the formation
        fluid sampling system of <figref idrefs=\"DRAWINGS\">FIG. 7</figref>;</div>\n
        \   <div num=\"p-0050\" class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG.
        9</figref> illustrates a further alternative formation fluid sampling system;</div>\n
        \   <div num=\"p-0051\" class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG.
        10</figref> is a detailed view of a packer employed in the formation fluid
        sampling system of <figref idrefs=\"DRAWINGS\">FIG. 9</figref>;</div>\n    <div
        num=\"p-0052\" class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG.
        11</figref> is a plan view of yet another embodiment of a formation fluid
        sampling system made in accordance with this disclosure;</div>\n    <div num=\"p-0053\"
        class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG. 12</figref>
        is a cross-sectional view of the formation fluid sampling system taken along
        line A-A of <figref idrefs=\"DRAWINGS\">FIG. 11</figref>;</div>\n    <div
        num=\"p-0054\" class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG.
        13</figref> is a plan view of still another embodiment of a formation fluid
        sampling system made in accordance with this disclosure;</div>\n    <div num=\"p-0055\"
        class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG. 14</figref>
        is a schematic illustration of the formation fluid sampling system housed
        in an angled stabilizing blade of a drill collar;</div>\n    <div num=\"p-0056\"
        class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG. 15</figref>
        is a schematic illustration of an alternative formation fluid sampling system
        similar to that of <figref idrefs=\"DRAWINGS\">FIG. 14</figref> housed in
        a vertical stabilizing blade of a drill collar;</div>\n    <div num=\"p-0057\"
        class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG. 16</figref>
        is an enlarged plan view of the formation fluid sampling system of <figref
        idrefs=\"DRAWINGS\">FIG. 15</figref>;</div>\n    <div num=\"p-0058\" class=\"description-paragraph\">
        <figref idrefs=\"DRAWINGS\">FIGS. 17A and 17B</figref> are schematic illustrations
        of a formation fluid sampling system having a pivotable probe assembly, made
        in accordance with this disclosure; and</div>\n    <div num=\"p-0059\" class=\"description-paragraph\">
        <figref idrefs=\"DRAWINGS\">FIG. 18</figref> is a schematic illustration of
        yet another embodiment of probe assembly, in which the inlet is elongated
        for use on a stabilizing blade of a drill collar.</div>\n  </description-of-drawings>\n\n\n
        \ <div num=\"p-0060\" class=\"description-paragraph\">It should be understood
        that the drawings are not necessarily to scale and that the disclosed embodiments
        we sometimes illustrated diagrammatically and in partial views. In certain
        instances, details which are not necessary for an understanding of the disclosed
        methods and apparatuses or which render other details difficult to perceive
        may have been omitted. It should be understood, of course, that this disclosure
        is not limited to the particular embodiments illustrated herein.</div>\n  <heading>DETAILED
        DESCRIPTION</heading>\n  <div num=\"p-0061\" class=\"description-paragraph\">This
        disclosure relates to probe assemblies and configurations described below
        that may be used with a downhole tool, either in a drilling environment or
        in a wireline environment. The apparatus and methods disclosed herein reduce
        the contamination of formation fluid samples. In some refinements, this disclosure
        relates to the relative positioning of multiple, independently operable probe
        assemblies. In one or more other refinements, a fluid sampling system includes
        a single assembly having multiple probes. In addition, a probe configuration
        particularly suited to while-drilling applications is disclosed.</div>\n  <div
        num=\"p-0062\" class=\"description-paragraph\">The phrase \u201Cformation
        evaluation while drilling\u201D refers to various sampling and testing operations
        that may be performed during the drilling process, such as sample collection,
        fluid pump out, pretests, pressure tests, fluid analysis, and resistivity
        tests, among others. It is noted that \u201Cformation evaluation while drilling\u201D
        does not necessarily mean that the measurements are made while the drill bit
        is actually cutting through the formation. For example, sample collection
        and pump out are usually performed during brief stops in the drilling process.
        That is, the rotation of the drill bit is briefly stopped so that the measurements
        may be made. Drilling may continue once the measurements are made. Even in
        embodiments where measurements are only made after drilling is stopped, the
        measurements may still be made without having to trip the drill string.</div>\n
        \ <div num=\"p-0063\" class=\"description-paragraph\">In the exemplary embodiments,
        a probe assembly according to the present disclosure is carried by a downhole
        tool, such as the <figure-callout id=\"10\" label=\"drilling tool\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00008.png\"
        state=\"{{state}}\">drilling tool</figure-callout> <b>10</b> of <figref idrefs=\"DRAWINGS\">FIG.
        1</figref> or the <figure-callout id=\"10\" label=\"wireline tool\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00008.png\"
        state=\"{{state}}\">wireline tool</figure-callout> <b>10</b>\u2032 of <figref
        idrefs=\"DRAWINGS\">FIG. 2</figref>. The probe assembly may also be used in
        other downhole tools adapted to draw fluid therein, such as coiled tubing,
        casing drilling, and other variations of downhole tools.</div>\n  <div num=\"p-0064\"
        class=\"description-paragraph\"> <figref idrefs=\"DRAWINGS\">FIG. 1</figref>
        depicts a <figure-callout id=\"10\" label=\"downhole drilling tool\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00008.png\"
        state=\"{{state}}\">downhole drilling tool</figure-callout> <b>10</b> deployed
        from a <figure-callout id=\"5\" label=\"rig\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">rig</figure-callout> <b>5</b> and advanced into the earth
        to form a <figure-callout id=\"14\" label=\"wellbore\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">wellbore</figure-callout> <b>14</b>. The wellbore penetrates
        a subterranean formation F containing a <figure-callout id=\"21\" label=\"formation
        fluid\" filenames=\"US07654321-20100202-D00001.png\" state=\"{{state}}\">formation
        fluid</figure-callout> <b>21</b>. The downhole drilling tool is suspended
        from the drilling rig by one or <figure-callout id=\"11\" label=\"more drill
        collars\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\">more drill collars</figure-callout> <b>11</b> that form
        a <figure-callout id=\"28\" label=\"drill string\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">drill string</figure-callout> <b>28</b>. \u201CMud\u201D
        is pumped through the <figure-callout id=\"28\" label=\"drill string\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">drill string</figure-callout> <b>28</b> and out <figure-callout
        id=\"30\" label=\"bit\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">bit</figure-callout> <b>30</b> of the <figure-callout
        id=\"10\" label=\"drilling tool\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00008.png\"
        state=\"{{state}}\">drilling tool</figure-callout> <b>10</b>. The mud is pumped
        back up through the wellbore and to the surface for filtering and recirculation.
        As the mud passes through the wellbore, it forms a mud layer or <figure-callout
        id=\"15\" label=\"mudcake\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">mudcake</figure-callout> <b>15</b> along the <figure-callout
        id=\"17\" label=\"wellbore wall\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b>. A portion of
        the mud infiltrates the formation to form an invaded <figure-callout id=\"25\"
        label=\"zone\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">zone</figure-callout>
        <b>25</b> of the formation F.</div>\n  <div num=\"p-0065\" class=\"description-paragraph\">In
        the illustrated embodiment, the <figure-callout id=\"10\" label=\"drilling
        tool\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00008.png\"
        state=\"{{state}}\">drilling tool</figure-callout> <b>10</b> is provided with
        a <figure-callout id=\"26\" label=\"probe\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">probe</figure-callout> <b>26</b> for establishing fluid
        communication with the formation F and drawing the fluid <b>21</b> into the
        downhole tool, as indicated by the arrows. As shown in <figref idrefs=\"DRAWINGS\">FIG.
        1</figref>, the probe is positioned in a stabilizer blade <b>23</b> of the
        drilling tool and extended therefrom to engage the wellbore wall. The stabilizer
        blade <b>23</b> comprises one or more blades that are in contact with the
        wellbore wall to limit \u201Cwobble\u201D of the <figure-callout id=\"30\"
        label=\"drill bit\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">drill bit</figure-callout> <b>30</b>. \u201CWobble\u201D
        is the tendency of the drill string, as it rotates, to deviate from the axis
        of the <figure-callout id=\"14\" label=\"wellbore\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">wellbore</figure-callout> <b>14</b> and cause the drill
        bit to change direction. Advantageously, a stabilizer blade <b>23</b> is already
        in contact with the wellbore wall, thus requiring less extension of a probe
        to establish fluid communication with the formation fluids if the probe is
        disposed in the stabilizer blade <b>23</b>.</div>\n  <div num=\"p-0066\" class=\"description-paragraph\">Fluid
        drawn into the downhole tool using the <figure-callout id=\"26\" label=\"probe\"
        filenames=\"US07654321-20100202-D00001.png\" state=\"{{state}}\">probe</figure-callout>
        <b>26</b> may be measured to determine, for example, pretest and/or pressure
        parameters. Additionally, the downhole tool may be provided with devices,
        such as sample chambers, for collecting fluid samples for retrieval at the
        surface. <figure-callout id=\"8\" label=\"Backup pistons\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">Backup pistons</figure-callout> <b>8</b> may also be provided
        to assist in applying force to push the drilling tool and/or probe against
        the wellbore wall. The drilling tool may be of a variety of chilling tools,
        such as Measurement-While-Drilling (\u201CMWD\u201D), Logging-While-Drilling
        (\u201CLWD\u201D), casing drilling, or other system. An example of a drilling
        tool usable for performing various downhole tests is depicted in U.S. patent
        application Ser. No. 10/707,152, filed on Nov. 24, 2003, the entire contents
        of which are hereby incorporated by reference.</div>\n  <div num=\"p-0067\"
        class=\"description-paragraph\">The <figure-callout id=\"10\" label=\"downhole
        drilling tool\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00008.png\"
        state=\"{{state}}\">downhole drilling tool</figure-callout> <b>10</b> may
        be removed from the wellbore and a <figure-callout id=\"10\" label=\"wireline
        tool\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00008.png\"
        state=\"{{state}}\">wireline tool</figure-callout> <b>10</b>\u2032 (<figref
        idrefs=\"DRAWINGS\">FIG. 2</figref>) may be lowered into the wellbore via
        a <figure-callout id=\"18\" label=\"wireline cable\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">wireline cable</figure-callout> <b>18</b>. An example
        of a wireline tool capable of sampling and/or testing is depicted in U.S.
        Pat. Nos. 4,936,139 and 4,860,581, the entire contents of which are hereby
        incorporated by reference. The <figure-callout id=\"10\" label=\"downhole
        tool\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00008.png\"
        state=\"{{state}}\">downhole tool</figure-callout> <b>10</b>\u2032 is deployable
        into <figure-callout id=\"14\" label=\"borehole\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">borehole</figure-callout> <b>14</b> and suspended therein
        with a <figure-callout id=\"18\" label=\"conventional wireline\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">conventional wireline</figure-callout> <b>18</b>, or conductor
        or conventional tubing or coiled tubing, below the <figure-callout id=\"5\"
        label=\"rig\" filenames=\"US07654321-20100202-D00001.png\" state=\"{{state}}\">rig</figure-callout>
        <b>5</b>. The illustrated <figure-callout id=\"10\" label=\"tool\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00008.png\"
        state=\"{{state}}\">tool</figure-callout> <b>10</b>\u2032 is provided with
        various modules and/or <figure-callout id=\"12\" label=\"components\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00005.png\"
        state=\"{{state}}\">components</figure-callout> <b>12</b> including, but not
        limited to, a <figure-callout id=\"26\" label=\"probe\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">probe</figure-callout> <b>26</b>\u2032 for establishing
        fluid communication with the formation F and drawing the fluid <b>21</b> into
        the downhole tool as shown by the arrows. <figure-callout id=\"8\" label=\"Backup
        pistons\" filenames=\"US07654321-20100202-D00001.png\" state=\"{{state}}\">Backup
        pistons</figure-callout> <b>8</b> may be provided to further thrust the downhole
        tool against the wellbore wall and assist the probe in engaging the wellbore
        wall The tools of <figref idrefs=\"DRAWINGS\">FIGS. 1 and 2</figref> may be
        modular as shown in <figref idrefs=\"DRAWINGS\">FIG. 2</figref> or unitary
        as shown in <figref idrefs=\"DRAWINGS\">FIG. 1</figref>, or combinations thereof.</div>\n
        \ <div num=\"p-0068\" class=\"description-paragraph\">Turning to <figref idrefs=\"DRAWINGS\">FIG.
        3</figref>, a <figure-callout id=\"30\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>30</b> is recessed
        within a stabilizing <figure-callout id=\"32\" label=\"blade\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">blade</figure-callout> <b>32</b> of a <figure-callout
        id=\"34\" label=\"drill collar\" filenames=\"US07654321-20100202-D00002.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>34</b>. The <figure-callout
        id=\"30\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>30</b> includes a <figure-callout
        id=\"36\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b>, a <figure-callout
        id=\"38\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>38</b>, and a <figure-callout
        id=\"40\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>40</b>. Each of
        the <figure-callout id=\"36\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b> is oriented generally transversely to a longitudinal
        axis of the <figure-callout id=\"34\" label=\"drill collar\" filenames=\"US07654321-20100202-D00002.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>34</b> and is normally
        in a retracted position so that the <figure-callout id=\"36\" label=\"inlets\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b> are housed within one or more cavities formed
        in the stabilizing <figure-callout id=\"32\" label=\"blade\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">blade</figure-callout> <b>32</b>. A dedicated probe extension
        mechanism, such as a hydraulic arm as described in U.S. Pat. Nos. 6,230,557;
        4,860,581; and 4,936,139 commonly assigned to the assignee of the present
        application, the entire contents of which are hereby incorporated by reference,
        is operatively coupled to each <figure-callout id=\"36\" label=\"inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlet\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlet</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b> to selectively and independently move the
        associated inlet to an extended position. In the extended position, the <figure-callout
        id=\"36\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, or <b>40</b> may extend outside of the cavity to place
        the inlet in better position to contact the <figure-callout id=\"17\" label=\"wellbore
        wall\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b>. Back up pistons
        <b>42</b> <i>a</i>-<i>c </i>are extendible to move the <figure-callout id=\"30\"
        label=\"probe assembly\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>30</b> toward the formation
        F.</div>\n  <div num=\"p-0069\" class=\"description-paragraph\">While the
        exemplary embodiment describes inlets that are extendable, it will be appreciated
        that the inlets may be non-extendable and therefore fixed with respect to
        the position of the <figure-callout id=\"34\" label=\"drill collar\" filenames=\"US07654321-20100202-D00002.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>34</b>. In addition,
        the <figure-callout id=\"30\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>30</b> may include
        a protector which provides mechanical protection to the inlets during drilling
        and/or tripping operations and which provides mechanical protection to the
        mudcake against erosion generated by flowing mud. One such protector is described
        in U.S. Pat. No. 6,729,399 commonly assigned to the assignee of the present
        application, the entire contents of which are hereby incorporated by reference.</div>\n
        \ <div num=\"p-0070\" class=\"description-paragraph\">As shown in <figref
        idrefs=\"DRAWINGS\">FIG. 4</figref>, fluid flowlines are connected to the
        inlets for passing either waste fluid or clean fluid. In the illustrated embodiment,
        <figure-callout id=\"36\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b> is fluidly connected
        to an <figure-callout id=\"52\" label=\"evaluation flowline\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">evaluation flowline</figure-callout> <b>52</b> by an <figure-callout
        id=\"54a\" label=\"inlet flowline\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlet flowline</figure-callout> <b>54</b> <i>a</i>. A
        <figure-callout id=\"56a\" label=\"bypass flowline\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">bypass flowline</figure-callout> <b>56</b> <i>a </i>fluidly
        communicates between the <figure-callout id=\"38\" label=\"sample probe\"
        filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\">sample probe</figure-callout> <b>38</b> and a clean up
        <figure-callout id=\"58\" label=\"flowline\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">flowline</figure-callout> <b>58</b>. The <figure-callout
        id=\"38\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>38</b> is also fluidly
        connected to the evaluation and clean up <figure-callout id=\"52\" label=\"flowlines\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"58\" label=\"flowlines\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">flowlines</figure-callout> </figure-callout> <b>52</b>,
        <b>58</b> by an inlet flowline <b>54</b> <i>b </i>and a bypass flowline <b>56</b>
        <i>b</i>, respectively. Similarly, the <figure-callout id=\"40\" label=\"second
        guard inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>40</b> is in fluid
        communication with the evaluation and clean up <figure-callout id=\"52\" label=\"flowlines\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"58\" label=\"flowlines\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">flowlines</figure-callout> </figure-callout> <b>52</b>,
        <b>58</b> by an <figure-callout id=\"54c\" label=\"inlet flowline\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlet flowline</figure-callout> <b>54</b> <i>c </i>and
        a bypass flowline <b>56</b> <i>c</i>. Valves <b>60</b> <i>a</i>-<i>f </i>are
        provided in the inlet and bypass flowlines <b>54</b>, <b>56</b> to direct
        fluid flow to the evaluation and clean up <figure-callout id=\"52\" label=\"flowlines\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"58\" label=\"flowlines\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">flowlines</figure-callout> </figure-callout> <b>52</b>,
        <b>58</b>, as desired. Fluid sensors, such as optical fluid analyzers <b>46</b>
        <i>a</i>, <b>46</b> <i>b</i>, are associated with the <figure-callout id=\"52\"
        label=\"flowlines\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"58\" label=\"flowlines\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">flowlines</figure-callout> </figure-callout> <b>52</b>,
        <b>58</b> to provide feedback regarding characteristics or other information
        regarding the fluid passing through the flowlines.</div>\n  <div num=\"p-0071\"
        class=\"description-paragraph\">A <figure-callout id=\"62\" label=\"pump\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">pump</figure-callout> <b>62</b> is fluidly coupled to
        the evaluation and clean up <figure-callout id=\"52\" label=\"flowlines\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"58\" label=\"flowlines\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">flowlines</figure-callout> </figure-callout> <b>52</b>,
        <b>58</b>. A sample storage assembly (not shown) may fluidly communicate with
        the <figure-callout id=\"52\" label=\"evaluation flowline\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">evaluation flowline</figure-callout> <b>52</b> upstream
        of the point where the <figure-callout id=\"52\" label=\"evaluation flowline\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">evaluation flowline</figure-callout> <b>52</b> and clean
        up <figure-callout id=\"58\" label=\"flowline\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">flowline</figure-callout> <b>58</b> are connected, to
        provide means for collecting a clean fluid sample. A <figure-callout id=\"64\"
        label=\"pump discharge flowline\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">pump discharge flowline</figure-callout> <b>64</b> may
        communicate between the pump and the <figure-callout id=\"14\" label=\"wellbore\"
        filenames=\"US07654321-20100202-D00001.png\" state=\"{{state}}\">wellbore</figure-callout>
        <b>14</b> for discharging contaminated formation fluid. The <figure-callout
        id=\"62\" label=\"pump\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">pump</figure-callout> <b>62</b> and valves <b>60</b> <i>a</i>-<i>f
        </i>may be operated in various manners to clear contaminated formation fluid
        from the immediate area of the <figure-callout id=\"36\" label=\"probes\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"probes\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"probes\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">probes</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b> and to draw clean formation fluid into the
        <figure-callout id=\"52\" label=\"evaluation flowline\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">evaluation flowline</figure-callout> <b>52</b>, such as
        the methods disclosed in U.S. Patent Application Publication No. 2006-0042793,
        the entire contents of which are hereby incorporated by Reference.</div>\n
        \ <div num=\"p-0072\" class=\"description-paragraph\">Each of the <figure-callout
        id=\"36\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b> of the <figure-callout id=\"30\" label=\"probe
        assembly\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>30</b> includes a packer
        for sealing with the <figure-callout id=\"17\" label=\"wellbore wall\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b>. As illustrated
        in <figref idrefs=\"DRAWINGS\">FIGS. 3 and 4</figref>, a <figure-callout id=\"80\"
        label=\"sample inlet packer\" filenames=\"US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet packer</figure-callout> <b>80</b> is provided
        that completely surrounds an outer periphery of the <figure-callout id=\"36\"
        label=\"sample inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b>. Similarly, first
        and second <figure-callout id=\"82\" label=\"guard inlet packers\" filenames=\"US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"84\" label=\"guard inlet packers\"
        filenames=\"US07654321-20100202-D00002.png\" state=\"{{state}}\">guard inlet
        packers</figure-callout> </figure-callout> <b>82</b>, <b>84</b> completely
        surround outer peripheries of the first and <figure-callout id=\"38\" label=\"second
        guard inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"second guard inlets\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">second guard inlets</figure-callout> </figure-callout>
        <b>38</b>, <b>40</b>, respectively.</div>\n  <div num=\"p-0073\" class=\"description-paragraph\">The
        <figure-callout id=\"36\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b> are positioned relative to one another to
        reduce the amount of contaminants that reach the <figure-callout id=\"36\"
        label=\"sample inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b>. In the illustrated
        embodiment, the <figure-callout id=\"38\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>38</b> is positioned
        adjacent to and above the <figure-callout id=\"36\" label=\"sample inlet\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b> while the <figure-callout
        id=\"40\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>40</b> is positioned
        adjacent to and below the <figure-callout id=\"36\" label=\"sample inlet\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b>. This arrangement
        of inlets minimizes or prevents fluid from the invaded zone from entering
        the <figure-callout id=\"36\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b>. The invaded <figure-callout
        id=\"25\" label=\"zone\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">zone</figure-callout>
        <b>25</b> is the area where mud filtrate has entered the formation F radially
        from the <figure-callout id=\"14\" label=\"wellbore\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">wellbore</figure-callout> <b>14</b>, leaving a layer of
        mudcake lining the <figure-callout id=\"17\" label=\"wellbore wall\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b>. Once filtrate-laden
        formation fluid from the invaded zone has been removed from the circumferential
        area surrounding the <figure-callout id=\"36\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b>, the first and <figure-callout id=\"38\" label=\"second
        guard inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"second guard inlets\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">second guard inlets</figure-callout> </figure-callout>
        <b>38</b>, <b>40</b> prevent mud filtrate and contaminated fluid from migrating
        axially toward the <figure-callout id=\"36\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b>. As a result,
        the <figure-callout id=\"36\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b> retrieves formation
        fluid having little or no filtrate contamination.</div>\n  <div num=\"p-0074\"
        class=\"description-paragraph\">The distance between the <figure-callout id=\"36\"
        label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b> must balance performance and structural considerations.
        On the one hand, it is desirable to locate the <figure-callout id=\"36\" label=\"inlets\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b> as close to one another as possible, thereby
        to minimize the volume of fluid that must be initially pumped from the formation
        before a clean fluid flow is obtained at the <figure-callout id=\"36\" label=\"sample
        inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b>. On the other
        hand, each <figure-callout id=\"36\" label=\"inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlet\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlet</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b> requires an aperture to be formed through
        an exterior of the drilling tool. In while-drilling applications, the drill
        collar carrying the probe assembly must be structurally sound to withstand
        the forces experienced during drilling operations. In addition, farther spaced
        <figure-callout id=\"36\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\"> <figure-callout id=\"38\" label=\"inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"inlets\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>36</b>, <b>38</b>, <b>40</b> reduce the chance of cross-contamination of
        flow streams into each inlet. As a practical matter, therefore, it is preferable
        to have a space between each adjacent pail of inlets of at least one inlet
        diameter.</div>\n  <div num=\"p-0075\" class=\"description-paragraph\">Various
        alternative inlet configurations and combinations may be used without departing
        from the scope of this disclosure. For example, instead of providing vertically
        aligned inlets as shown in <figref idrefs=\"DRAWINGS\">FIGS. 3 and 4</figref>,
        the <figure-callout id=\"36\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b> may be azimuthally
        offset from the first and <figure-callout id=\"38\" label=\"second guard inlets\"
        filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"second guard inlets\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">second guard inlets</figure-callout> </figure-callout>
        <b>38</b>, <b>40</b>, as shown in <figref idrefs=\"DRAWINGS\">FIG. 5</figref>.
        In this embodiment, the <figure-callout id=\"36\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b> extends from a
        first side of the <figure-callout id=\"11\" label=\"drill collar\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>11</b> while the first
        and <figure-callout id=\"38\" label=\"second guard inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"second guard inlets\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">second guard inlets</figure-callout> </figure-callout>
        <b>38</b>, <b>40</b> extend from a second, opposite side of the <figure-callout
        id=\"11\" label=\"drill collar\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>11</b>. This configuration
        is still effective to prevent filtrate from reaching the <figure-callout id=\"36\"
        label=\"sample inlet\" filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>36</b> because the first
        and <figure-callout id=\"38\" label=\"second guard inlets\" filenames=\"US07654321-20100202-D00002.png,US07654321-20100202-D00003.png\"
        state=\"{{state}}\"> <figure-callout id=\"40\" label=\"second guard inlets\"
        filenames=\"US07654321-20100202-D00000.png,US07654321-20100202-D00002.png\"
        state=\"{{state}}\">second guard inlets</figure-callout> </figure-callout>
        <b>38</b>, <b>40</b> remove fluid from an area of the formation lying within
        an annular band surrounding each inlet Alternatively, an <figure-callout id=\"86\"
        label=\"additional guard inlet\" filenames=\"US07654321-20100202-D00003.png\"
        state=\"{{state}}\">additional guard inlet</figure-callout> <b>86</b> may
        be provided as shown in <figref idrefs=\"DRAWINGS\">FIG. 6</figref>.</div>\n
        \ <div num=\"p-0076\" class=\"description-paragraph\">An alternative probe
        assembly embodiment having multiple inlets actuated by a single extension
        mechanism is illustrated in <figref idrefs=\"DRAWINGS\">FIGS. 7 and 8</figref>.
        A <figure-callout id=\"100\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>100</b> is illustrated
        as recessed within a <figure-callout id=\"101\" label=\"stabilizer blade\"
        filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">stabilizer
        blade</figure-callout> <b>101</b> of a <figure-callout id=\"103\" label=\"drill
        collar\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">drill
        collar</figure-callout> <b>103</b>. The <figure-callout id=\"100\" label=\"probe
        assembly\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">probe
        assembly</figure-callout> <b>100</b> includes <figure-callout id=\"102\" label=\"sample
        inlet\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">sample
        inlet</figure-callout> <b>102</b>, a <figure-callout id=\"104\" label=\"first
        guard inlet\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">first
        guard inlet</figure-callout> <b>104</b>, and a <figure-callout id=\"106\"
        label=\"second guard inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>106</b>. The <figure-callout
        id=\"102\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">
        <figure-callout id=\"104\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\"> <figure-callout id=\"106\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>102</b>, <b>104</b>, <b>106</b> may be operatively coupled to a single
        extension mechanism that simultaneously advances and retracts the probes or,
        alternatively, the inlets may be non-extendable. The <figure-callout id=\"100\"
        label=\"probe assembly\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">probe
        assembly</figure-callout> <b>100</b> further includes a <figure-callout id=\"110\"
        label=\"single packer\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">single
        packer</figure-callout> <b>110</b> that completely surrounds outer peripheries
        of the <figure-callout id=\"102\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>102</b>, <figure-callout
        id=\"104\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>104</b>, and <figure-callout
        id=\"106\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>106</b>. The <figure-callout
        id=\"102\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">
        <figure-callout id=\"104\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\"> <figure-callout id=\"106\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>102</b>, <b>104</b>, <b>106</b> are generally vertically aligned with the
        <figure-callout id=\"102\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>102</b> positioned in
        between the first and <figure-callout id=\"104\" label=\"second guard inlets\"
        filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\"> <figure-callout
        id=\"106\" label=\"second guard inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">second guard inlets</figure-callout> </figure-callout>
        <b>104</b>, <b>106</b>. A back up <figure-callout id=\"107\" label=\"piston\"
        filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">piston</figure-callout>
        <b>107</b> is provided for positioning the <figure-callout id=\"100\" label=\"assembly\"
        filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">assembly</figure-callout>
        <b>100</b> adjacent the <figure-callout id=\"17\" label=\"wellbore wall\"
        filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b>.</div>\n  <div
        num=\"p-0077\" class=\"description-paragraph\">In operation, the <figure-callout
        id=\"103\" label=\"drill collar\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>103</b> carrying the
        <figure-callout id=\"100\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>100</b> is positioned
        within the <figure-callout id=\"14\" label=\"wellbore\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">wellbore</figure-callout> <b>14</b>, as illustrated in
        <figref idrefs=\"DRAWINGS\">FIG. 8</figref>. To perform testing, the <figure-callout
        id=\"100\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>100</b> is positioned
        adjacent the <figure-callout id=\"17\" label=\"wellbore wall\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b>, either by extending
        the <figure-callout id=\"102\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\"> <figure-callout id=\"104\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\"> <figure-callout id=\"106\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>102</b>, <b>104</b>, <b>106</b> away from the <figure-callout id=\"103\"
        label=\"drill collar\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">drill
        collar</figure-callout> <b>103</b> or by extending the back up <figure-callout
        id=\"107\" label=\"piston\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">piston</figure-callout>
        <b>107</b>, or both, until the <figure-callout id=\"110\" label=\"packer\"
        filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">packer</figure-callout>
        <b>110</b> contacts the <figure-callout id=\"17\" label=\"wellbore wall\"
        filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b> and forms a seal
        with the <figure-callout id=\"15\" label=\"mudcake\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">mudcake</figure-callout> <b>15</b>. As discussed above,
        the drilling mud seeps into the formation through the <figure-callout id=\"17\"
        label=\"wellbore wall\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b> and creates an
        invaded <figure-callout id=\"25\" label=\"zone\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">zone</figure-callout> <b>25</b> about the <figure-callout
        id=\"14\" label=\"wellbore\" filenames=\"US07654321-20100202-D00001.png\"
        state=\"{{state}}\">wellbore</figure-callout> <b>14</b>, leaving a layer of
        <figure-callout id=\"15\" label=\"mudcake\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">mudcake</figure-callout> <b>15</b> that lines the <figure-callout
        id=\"17\" label=\"wellbore wall\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b>. The invaded
        <figure-callout id=\"25\" label=\"zone\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">zone</figure-callout> <b>25</b> contains mud and other
        wellbore fluids that contaminate the surrounding formation, including the
        formation F having a zone of <figure-callout id=\"114\" label=\"clean formation
        fluid\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">clean
        formation fluid</figure-callout> <b>114</b> contained therein. As illustrated
        in <figref idrefs=\"DRAWINGS\">FIG. 8</figref>, operation of the <figure-callout
        id=\"100\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>100</b> will remove
        contaminated formation fluid from the area immediately surrounding the <figure-callout
        id=\"102\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">
        <figure-callout id=\"104\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\"> <figure-callout id=\"106\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>102</b>, <b>104</b>, <b>106</b>. During operation, filtrate may continue
        to migrate axially through the invaded <figure-callout id=\"25\" label=\"zone\"
        filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">zone</figure-callout>
        <b>25</b>, in either the upward or downward direction. Any such migrant filtrate
        will be removed by the first and <figure-callout id=\"104\" label=\"second
        guard inlets\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">
        <figure-callout id=\"106\" label=\"second guard inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">second guard inlets</figure-callout> </figure-callout>
        <b>104</b>, <b>106</b> prior to reaching the <figure-callout id=\"102\" label=\"sample
        inlet\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">sample
        inlet</figure-callout> <b>102</b>, thereby allowing the <figure-callout id=\"102\"
        label=\"sample inlet\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">sample
        inlet</figure-callout> <b>102</b> to retrieve substantially clean formation
        fluid samples.</div>\n  <div num=\"p-0078\" class=\"description-paragraph\">
        <figref idrefs=\"DRAWINGS\">FIGS. 9 and 10</figref> illustrate an alternative
        embodiment of a single probe assembly having multiple inlets. A <figure-callout
        id=\"120\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>120</b> is shown coupled
        to a <figure-callout id=\"122\" label=\"drill collar\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>122</b>. The <figure-callout
        id=\"120\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>120</b> includes a
        <figure-callout id=\"124\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>124</b>, a <figure-callout
        id=\"126\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>126</b>, and a <figure-callout
        id=\"128\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>128</b>. A <figure-callout
        id=\"130\" label=\"single packer\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">single packer</figure-callout> <b>130</b> is provided
        having an <figure-callout id=\"132\" label=\"outer portion\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">outer portion</figure-callout> <b>132</b> surrounding
        the exterior portions of the <figure-callout id=\"124\" label=\"sample inlet\"
        filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">sample inlet</figure-callout>
        <b>124</b>, <figure-callout id=\"126\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>126</b>, and <figure-callout
        id=\"128\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>128</b>. The <figure-callout
        id=\"130\" label=\"packer\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">packer</figure-callout>
        <b>130</b> also includes a first interior segment <b>134</b> extending between
        the <figure-callout id=\"124\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>124</b> and the <figure-callout
        id=\"126\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>126</b>, and a second
        <figure-callout id=\"136\" label=\"interior segment\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">interior segment</figure-callout> <b>136</b> extending
        between the <figure-callout id=\"124\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>124</b> and the <figure-callout
        id=\"128\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>128</b>. In the
        illustrated embodiment, the exterior peripheries of the <figure-callout id=\"124\"
        label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">
        <figure-callout id=\"126\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\"> <figure-callout id=\"128\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>124</b>, <b>126</b>, <b>128</b> trace an oval shape that is interrupted
        by the first and <figure-callout id=\"136\" label=\"second packer segments\"
        filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">second packer
        segments</figure-callout> <b>134</b>, <b>136</b>. In this arrangement, the
        <figure-callout id=\"124\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\"> <figure-callout id=\"126\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\"> <figure-callout id=\"128\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>124</b>, <b>126</b>, <b>128</b> are positioned more closely to one another
        in the vertical direction, which may improve the clarity of the formation
        fluid sample retrieved through the <figure-callout id=\"124\" label=\"sample
        probe\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">sample
        probe</figure-callout> <b>124</b>.</div>\n  <div num=\"p-0079\" class=\"description-paragraph\">The
        first and <figure-callout id=\"136\" label=\"second packer segments\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">second packer segments</figure-callout> <b>134</b>, <b>136</b>
        may be reinforced to improve their resistance to pressure differentials. A
        reinforcement material, such as a metal, composite, or other high strength
        material, may be molded into the first and <figure-callout id=\"136\" label=\"second
        segments\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">second
        segments</figure-callout> <b>134</b>, <b>136</b> of the <figure-callout id=\"130\"
        label=\"rubber packer\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">rubber
        packer</figure-callout> <b>130</b>. The first and <figure-callout id=\"136\"
        label=\"second segments\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">second
        segments</figure-callout> <b>134</b>, <b>136</b> prevent filtrate from migrating
        vertically into the <figure-callout id=\"124\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>124</b>. While the left
        and right side sections of the <figure-callout id=\"124\" label=\"sample inlet\"
        filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">sample inlet</figure-callout>
        <b>124</b> are left relatively unprotected, it has been found that the circumferential
        area surrounding the <figure-callout id=\"124\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>124</b> remains relatively
        clear of filtrate once it has been initially evacuated, and that the first
        and <figure-callout id=\"126\" label=\"second guard inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\"> <figure-callout id=\"128\" label=\"second guard inlets\"
        filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">second guard
        inlets</figure-callout> </figure-callout> <b>126</b>, <b>128</b> prevent vertical
        migration into this area of the formation. Additionally, the <figure-callout
        id=\"124\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>124</b> configuration
        illustrated in <figref idrefs=\"DRAWINGS\">FIGS. 9 and 10</figref> allow these
        unprotected side sections to be fairly small, thereby further minimizing the
        potential for filtrate or formation fluid contaminated with filtrate to reach
        the <figure-callout id=\"124\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>124</b>. While the <figure-callout
        id=\"124\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\" state=\"{{state}}\">
        <figure-callout id=\"126\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\"> <figure-callout id=\"128\" label=\"inlets\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>124</b>, <b>126</b>, <b>128</b> are shown with shapes that fit within an
        oval shaped packer <figure-callout id=\"132\" label=\"outer portion\" filenames=\"US07654321-20100202-D00004.png\"
        state=\"{{state}}\">outer portion</figure-callout> <b>132</b>, it will be
        appreciated that other shapes may be used without departing from the scope
        of this Disclosure.</div>\n  <div num=\"p-0080\" class=\"description-paragraph\">A
        further refinement is illustrated in <figref idrefs=\"DRAWINGS\">FIGS. 11
        and 12</figref>, which show a <figure-callout id=\"150\" label=\"probe assembly\"
        filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">probe assembly</figure-callout>
        <b>150</b> with a <figure-callout id=\"152\" label=\"guard channel\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard channel</figure-callout> <b>152</b> formed in an
        exterior face of a <figure-callout id=\"154\" label=\"packer\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">packer</figure-callout> <b>154</b>. The <figure-callout
        id=\"150\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>150</b> includes a
        <figure-callout id=\"156\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>156</b>, a <figure-callout
        id=\"158\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>158</b>, and a <figure-callout
        id=\"160\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>160</b>. The <figure-callout
        id=\"154\" label=\"packer\" filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">packer</figure-callout>
        <b>154</b> completely surrounds the outer peripheries of the <figure-callout
        id=\"156\" label=\"inlets\" filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">
        <figure-callout id=\"158\" label=\"inlets\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\"> <figure-callout id=\"160\" label=\"inlets\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>156</b>, <b>158</b>, <b>160</b>. The <figure-callout id=\"152\" label=\"guard
        channel\" filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">guard
        channel</figure-callout> <b>152</b> is formed as a recess in the exterior
        surface of the <figure-callout id=\"154\" label=\"packer\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">packer</figure-callout> <b>154</b>. The <figure-callout
        id=\"152\" label=\"guard channel\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard channel</figure-callout> <b>152</b> includes a <figure-callout
        id=\"162\" label=\"central ring section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">central ring section</figure-callout> <b>162</b> that
        is spaced from and completely surrounds an outer periphery of the <figure-callout
        id=\"156\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>156</b>, a first <figure-callout
        id=\"164\" label=\"guard ring section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard ring section</figure-callout> <b>164</b> that borders
        on and completely surrounds an outer periphery of the <figure-callout id=\"158\"
        label=\"first guard inlet\" filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">first
        guard inlet</figure-callout> <b>158</b>, and a second <figure-callout id=\"166\"
        label=\"guard ring section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard ring section</figure-callout> <b>166</b> that borders
        on and completely surrounds an outer periphery of the <figure-callout id=\"160\"
        label=\"second guard inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>160</b>. A <figure-callout
        id=\"168\" label=\"first link section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">first link section</figure-callout> <b>168</b> extends
        between the <figure-callout id=\"162\" label=\"central ring section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">central ring section</figure-callout> <b>162</b> and the
        first <figure-callout id=\"164\" label=\"guard ring section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard ring section</figure-callout> <b>164</b>, and a
        <figure-callout id=\"170\" label=\"second link section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">second link section</figure-callout> <b>170</b> extends
        between the <figure-callout id=\"162\" label=\"central ring section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">central ring section</figure-callout> <b>162</b> and the
        second <figure-callout id=\"166\" label=\"guard ring section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard ring section</figure-callout> <b>166</b>.</div>\n
        \ <div num=\"p-0081\" class=\"description-paragraph\">In the illustrated embodiment,
        the <figure-callout id=\"152\" label=\"guard channel\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard channel</figure-callout> <b>152</b> is formed in
        a <figure-callout id=\"172\" label=\"channel insert\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">channel insert</figure-callout> <b>172</b> that is coupled
        to the <figure-callout id=\"154\" label=\"packer\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">packer</figure-callout> <b>154</b>. For example, the <figure-callout
        id=\"172\" label=\"channel insert\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">channel insert</figure-callout> <b>172</b> may be mechanically
        coupled to the <figure-callout id=\"154\" label=\"packer\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">packer</figure-callout> <b>154</b> such as by forming
        <figure-callout id=\"174\" label=\"tabs\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">tabs</figure-callout> <b>174</b> that are received in
        <figure-callout id=\"176\" label=\"anchor slots\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">anchor slots</figure-callout> <b>176</b> to form a dove-tail
        like connection, as best shown in <figref idrefs=\"DRAWINGS\">FIG. 12</figref>.
        The <figure-callout id=\"172\" label=\"channel insert\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">channel insert</figure-callout> <b>172</b> may be made
        from a low modulus material, such as titanium alloy, to better conform to
        the wall of the wellbore. It will be appreciated that low modulus materials
        other than titanium alloy may be used without departing from the scope of
        this disclosure. The channel may be defined by a structural conduit as shown
        in <figref idrefs=\"DRAWINGS\">FIG. 12</figref>, or may be defined by a porous
        material with integral flow passages.</div>\n  <div num=\"p-0082\" class=\"description-paragraph\">An
        alternative assembly using a different guard channel configuration is illustrated
        in <figref idrefs=\"DRAWINGS\">FIG. 13</figref>. A <figure-callout id=\"180\"
        label=\"guard probe assembly\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard probe assembly</figure-callout> <b>180</b> includes
        a <figure-callout id=\"182\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>182</b>, a <figure-callout
        id=\"184\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>184</b>, and a <figure-callout
        id=\"186\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>186</b>. A <figure-callout
        id=\"188\" label=\"packer\" filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">packer</figure-callout>
        <b>188</b> completely surrounds the outer peripheries of the sample, first
        guard, and second guard inlets, <b>182</b>, <b>184</b>, <b>186</b>. A <figure-callout
        id=\"190\" label=\"sample inlet channel\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">sample inlet channel</figure-callout> <b>190</b> is provided
        on an exterior surface of the <figure-callout id=\"188\" label=\"packer\"
        filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">packer</figure-callout>
        <b>188</b> that borders on and completely surrounds an outer periphery of
        the <figure-callout id=\"182\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>182</b>. A <figure-callout
        id=\"191\" label=\"first guard channel\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">first guard channel</figure-callout> <b>191</b> includes
        a first <figure-callout id=\"192\" label=\"guard ring section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard ring section</figure-callout> <b>192</b> that borders
        on and completely surrounds an outer periphery of the <figure-callout id=\"184\"
        label=\"first guard inlet\" filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">first
        guard inlet</figure-callout> <b>184</b>. First and <figure-callout id=\"193\"
        label=\"second wings\" filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">
        <figure-callout id=\"194\" label=\"second wings\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">second wings</figure-callout> </figure-callout> <b>193</b>,
        <b>194</b> fluidly communicate with the first <figure-callout id=\"192\" label=\"guard
        ring section\" filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">guard
        ring section</figure-callout> <b>192</b> and extend laterally outwardly from
        opposite sides of the <figure-callout id=\"192\" label=\"first guarding section\"
        filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">first guarding
        section</figure-callout> <b>192</b>. The first and <figure-callout id=\"193\"
        label=\"second wing sections\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\"> <figure-callout id=\"194\" label=\"second wing sections\"
        filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">second wing
        sections</figure-callout> </figure-callout> <b>193</b>, <b>194</b> are curved
        to extend toward the <figure-callout id=\"182\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>182</b>, as shown in
        <figref idrefs=\"DRAWINGS\">FIG. 13</figref>. A <figure-callout id=\"195\"
        label=\"second guard channel\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">second guard channel</figure-callout> <b>195</b> includes
        a second <figure-callout id=\"196\" label=\"guard ring section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard ring section</figure-callout> <b>196</b> that borders
        on and completely surrounds an outer periphery of the <figure-callout id=\"186\"
        label=\"second guard inlet\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>186</b>. The <figure-callout
        id=\"195\" label=\"second guard channel\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">second guard channel</figure-callout> <b>195</b> includes
        first and <figure-callout id=\"197\" label=\"second wing sections\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\"> <figure-callout id=\"198\" label=\"second wing sections\"
        filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">second wing
        sections</figure-callout> </figure-callout> <b>197</b>, <b>198</b> that fluidly
        communicate with and extend from opposite sides of the second <figure-callout
        id=\"196\" label=\"guard ring section\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">guard ring section</figure-callout> <b>196</b>. The first
        and <figure-callout id=\"197\" label=\"second wings\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\"> <figure-callout id=\"198\" label=\"second wings\" filenames=\"US07654321-20100202-D00005.png\"
        state=\"{{state}}\">second wings</figure-callout> </figure-callout> <b>197</b>,
        <b>198</b> are also curved to extend toward the <figure-callout id=\"182\"
        label=\"sample inlet\" filenames=\"US07654321-20100202-D00005.png\" state=\"{{state}}\">sample
        inlet</figure-callout> <b>182</b>.</div>\n  <div num=\"p-0083\" class=\"description-paragraph\">Further
        alternative embodiments of a probe assembly are illustrated in <figref idrefs=\"DRAWINGS\">FIGS.
        14 and 15</figref>. <figref idrefs=\"DRAWINGS\">FIG. 14</figref> illustrates
        a <figure-callout id=\"200\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>200</b> positioned
        on a probe/<figure-callout id=\"202\" label=\"stabilizer blade\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">stabilizer blade</figure-callout> <b>202</b> of a <figure-callout
        id=\"204\" label=\"drill collar\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>204</b>, which also includes
        stabilizer blades <b>202</b> <i>a</i>. The probe/<figure-callout id=\"202\"
        label=\"stabilizer blade\" filenames=\"US07654321-20100202-D00006.png\" state=\"{{state}}\">stabilizer
        blade</figure-callout> <b>202</b> is angled with respect to a vertical axis
        of the <figure-callout id=\"204\" label=\"drill collar\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>204</b>. In <figref idrefs=\"DRAWINGS\">FIG.
        14</figref>, a <figure-callout id=\"210\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>210</b> is shown coupled
        to a probe/<figure-callout id=\"212\" label=\"stabilizer blade\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">stabilizer blade</figure-callout> <b>212</b> of a <figure-callout
        id=\"214\" label=\"drill collar\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>214</b>, wherein the
        probe/<figure-callout id=\"212\" label=\"stabilizer blade\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">stabilizer blade</figure-callout> <b>212</b> is substantially
        parallel to a vertical axis of the <figure-callout id=\"214\" label=\"drill
        collar\" filenames=\"US07654321-20100202-D00006.png\" state=\"{{state}}\">drill
        collar</figure-callout> <b>214</b>. The <figure-callout id=\"214\" label=\"drill
        collar\" filenames=\"US07654321-20100202-D00006.png\" state=\"{{state}}\">drill
        collar</figure-callout> <b>214</b> also includes additional stabilizer blades
        <b>212</b> <i>a. </i> </div>\n  <div num=\"p-0084\" class=\"description-paragraph\">The
        <figure-callout id=\"210\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>210</b> is illustrated
        in greater detail at <figref idrefs=\"DRAWINGS\">FIG. 16</figref>. The <figure-callout
        id=\"210\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>210</b> includes a
        <figure-callout id=\"220\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>220</b>, a <figure-callout
        id=\"222\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>222</b>, and a <figure-callout
        id=\"224\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>224</b>. Similar
        to previous embodiments, the <figure-callout id=\"220\" label=\"inlets\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\"> <figure-callout id=\"222\" label=\"inlets\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\"> <figure-callout id=\"224\" label=\"inlets\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">inlets</figure-callout> </figure-callout> </figure-callout>
        <b>220</b>, <b>222</b>, <b>224</b> are substantially vertically aligned, with
        the <figure-callout id=\"220\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>220</b> positioned between
        the first and <figure-callout id=\"222\" label=\"second guard inlets\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\"> <figure-callout id=\"224\" label=\"second guard inlets\"
        filenames=\"US07654321-20100202-D00006.png\" state=\"{{state}}\">second guard
        inlets</figure-callout> </figure-callout> <b>222</b>, <b>224</b>.</div>\n
        \ <div num=\"p-0085\" class=\"description-paragraph\">A <figure-callout id=\"226\"
        label=\"composite packer\" filenames=\"US07654321-20100202-D00006.png\" state=\"{{state}}\">composite
        packer</figure-callout> <b>226</b> completely surrounds the outer peripheries
        of the <figure-callout id=\"220\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>220</b>, <figure-callout
        id=\"222\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>222</b>, and <figure-callout
        id=\"224\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>224</b>. The <figure-callout
        id=\"226\" label=\"composite packer\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">composite packer</figure-callout> <b>226</b> may include
        segments that permit independent extension or retraction of each <figure-callout
        id=\"220\" label=\"inlet\" filenames=\"US07654321-20100202-D00006.png\" state=\"{{state}}\">
        <figure-callout id=\"222\" label=\"inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\"> <figure-callout id=\"224\" label=\"inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">inlet</figure-callout> </figure-callout> </figure-callout>
        <b>220</b>, <b>222</b>, <b>224</b>. In the illustrated embodiment, the <figure-callout
        id=\"226\" label=\"composite packer\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">composite packer</figure-callout> <b>226</b> includes
        a <figure-callout id=\"230\" label=\"sample inlet segment\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">sample inlet segment</figure-callout> <b>230</b>, a first
        <figure-callout id=\"232\" label=\"guard inlet segment\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">guard inlet segment</figure-callout> <b>232</b>, and a
        second <figure-callout id=\"234\" label=\"guard inlet segment\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">guard inlet segment</figure-callout> <b>234</b>. To independently
        actuate each probe, a sample inlet extender is operatively coupled to the
        <figure-callout id=\"220\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>220</b>, a first guard
        inlet extender is operatively coupled to the <figure-callout id=\"222\" label=\"first
        guard inlet\" filenames=\"US07654321-20100202-D00006.png\" state=\"{{state}}\">first
        guard inlet</figure-callout> <b>222</b>, and a second guard inlet extender
        is operatively coupled to the <figure-callout id=\"224\" label=\"second guard
        inlet\" filenames=\"US07654321-20100202-D00006.png\" state=\"{{state}}\">second
        guard inlet</figure-callout> <b>224</b>. The <figure-callout id=\"230\" label=\"segments\"
        filenames=\"US07654321-20100202-D00006.png\" state=\"{{state}}\"> <figure-callout
        id=\"232\" label=\"segments\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\"> <figure-callout id=\"234\" label=\"segments\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">segments</figure-callout> </figure-callout> </figure-callout>
        <b>230</b>, <b>232</b>, <b>234</b> are shaped so that the <figure-callout
        id=\"226\" label=\"composite packer\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">composite packer</figure-callout> <b>226</b> has a substantially
        contiguous outer periphery. In the illustrated embodiment, the outer periphery
        has an oval shape.</div>\n  <div num=\"p-0086\" class=\"description-paragraph\">The
        <figure-callout id=\"220\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>220</b> may be shaped
        to maximize fluid withdrawal in a circumferential direction while minimizing
        fluid withdrawal from the formation in a vertical direction. In the illustrated
        embodiment, the <figure-callout id=\"220\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00006.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>220</b> has an oval shape
        with a major axis extending in a substantially horizontal direction and a
        minor axis extending in a substantially vertical direction, parallel to the
        wellbore axis. While an oval shape is illustrated, other shapes, including
        elongate and oblong profiles, may be used without departing from the scope
        of this disclosure.</div>\n  <div num=\"p-0087\" class=\"description-paragraph\">
        <figref idrefs=\"DRAWINGS\">FIGS. 17A and 17B</figref> illustrate an alternative
        embodiment of a sample probe assembly that is pivotable to conform to contour
        of the wellbore wall, thereby more reliably forming a seal therewith. It will
        be appreciated that the <figure-callout id=\"17\" label=\"wellbore wall\"
        filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b> is not always
        parallel to an <figure-callout id=\"250\" label=\"axis\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">axis</figure-callout> <b>250</b> of a downhole tool. Consequently,
        the packer of a probe assembly may be presented at an angle to the wellbore,
        thereby reducing the ability to sufficiently seal with the wellbore wall.
        As shown in <figref idrefs=\"DRAWINGS\">FIG. 16A</figref>, a <figure-callout
        id=\"252\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>252</b> is coupled
        to a <figure-callout id=\"254\" label=\"drill collar\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">drill collar</figure-callout> <b>254</b> by a <figure-callout
        id=\"256\" label=\"probe extender\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">probe extender</figure-callout> <b>256</b>. The <figure-callout
        id=\"252\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>252</b> includes a
        <figure-callout id=\"258\" label=\"backing plate\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">backing plate</figure-callout> <b>258</b> having a <figure-callout
        id=\"260\" label=\"bracket\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">bracket</figure-callout> <b>260</b> attached thereto.
        The <figure-callout id=\"260\" label=\"bracket\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">bracket</figure-callout> <b>260</b> is pivotably coupled
        to an end of the <figure-callout id=\"256\" label=\"probe extender\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">probe extender</figure-callout> <b>256</b>. The <figure-callout
        id=\"258\" label=\"backing plate\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">backing plate</figure-callout> <b>258</b> carries a <figure-callout
        id=\"264\" label=\"packer\" filenames=\"US07654321-20100202-D00007.png\" state=\"{{state}}\">packer</figure-callout>
        <b>264</b>, a <figure-callout id=\"266\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>266</b>, a <figure-callout
        id=\"268\" label=\"first guard inlet\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">first guard inlet</figure-callout> <b>268</b>, and a <figure-callout
        id=\"270\" label=\"second guard inlet\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">second guard inlet</figure-callout> <b>270</b>. The <figure-callout
        id=\"256\" label=\"probe extender\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">probe extender</figure-callout> <b>256</b> may be provided
        as an actuating cylinder that is operatively coupled to a power supply, such
        as a source of <figure-callout id=\"272\" label=\"hydraulic fluid\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">hydraulic fluid</figure-callout> <b>272</b>.</div>\n  <div
        num=\"p-0088\" class=\"description-paragraph\">In operation, the <figure-callout
        id=\"256\" label=\"probe extender\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">probe extender</figure-callout> <b>256</b> may be actuated
        to move the <figure-callout id=\"252\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>252</b> from a retracted
        position where the assembly is spaced from the <figure-callout id=\"17\" label=\"wellbore
        wall\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b>, shown in <figref
        idrefs=\"DRAWINGS\">FIG. 17A</figref>, to an extended position where the assembly
        engages the <figure-callout id=\"17\" label=\"wellbore wall\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b>, shown in <figref
        idrefs=\"DRAWINGS\">FIG. 17B</figref>. The pivotable connection between the
        <figure-callout id=\"256\" label=\"extender\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">extender</figure-callout> <b>256</b> and the <figure-callout
        id=\"258\" label=\"backing plate\" filenames=\"US07654321-20100202-D00007.png\"
        state=\"{{state}}\">backing plate</figure-callout> <b>258</b> allows the <figure-callout
        id=\"264\" label=\"packer\" filenames=\"US07654321-20100202-D00007.png\" state=\"{{state}}\">packer</figure-callout>
        <b>264</b> to tilt complementary to the <figure-callout id=\"17\" label=\"wellbore
        wall\" filenames=\"US07654321-20100202-D00001.png,US07654321-20100202-D00004.png\"
        state=\"{{state}}\">wellbore wall</figure-callout> <b>17</b>, thereby more
        reliably sealing with the wall.</div>\n  <div num=\"p-0089\" class=\"description-paragraph\">
        <figref idrefs=\"DRAWINGS\">FIG. 18</figref> illustrates a further embodiment
        of a <figure-callout id=\"300\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>300</b> having an elongated
        profile to provide improved fluid flow while meeting the size constraints
        associated with use in a stabilizing <figure-callout id=\"302\" label=\"blade\"
        filenames=\"US07654321-20100202-D00008.png\" state=\"{{state}}\">blade</figure-callout>
        <b>302</b> of a drilling tool, such as drilling collar <b>307</b>. The <figure-callout
        id=\"300\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>300</b> is housed within
        a cavity <b>309</b> formed in the <figure-callout id=\"302\" label=\"blade\"
        filenames=\"US07654321-20100202-D00008.png\" state=\"{{state}}\">blade</figure-callout>
        <b>302</b> so that the <figure-callout id=\"300\" label=\"assembly\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">assembly</figure-callout> <b>300</b> may be recessed during
        drilling operations. An extension mechanism (not shown) is provided to extend
        the <figure-callout id=\"300\" label=\"assembly\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">assembly</figure-callout> <b>300</b> into contact with
        the wellbore wall to perform sampling operations.</div>\n  <div num=\"p-0090\"
        class=\"description-paragraph\">The <figure-callout id=\"300\" label=\"assembly\"
        filenames=\"US07654321-20100202-D00008.png\" state=\"{{state}}\">assembly</figure-callout>
        <b>300</b> includes a <figure-callout id=\"304\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>304</b> having an expanded
        <figure-callout id=\"306\" label=\"mouth portion\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">mouth portion</figure-callout> <b>306</b>. The <figure-callout
        id=\"306\" label=\"mouth portion\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">mouth portion</figure-callout> <b>306</b> is elongated
        along a <figure-callout id=\"303\" label=\"longitudinal axis\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">longitudinal axis</figure-callout> <b>303</b> of the <figure-callout
        id=\"302\" label=\"blade\" filenames=\"US07654321-20100202-D00008.png\" state=\"{{state}}\">blade</figure-callout>
        <b>302</b> to provide an enlarged communication surface for engaging the formation.
        More specifically, the mouth portion has a first profile dimension in a direction
        parallel to the <figure-callout id=\"303\" label=\"blade axis\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">blade axis</figure-callout> <b>303</b> and a second profile
        dimension in a direction perpendicular to the <figure-callout id=\"303\" label=\"blade
        axis\" filenames=\"US07654321-20100202-D00008.png\" state=\"{{state}}\">blade
        axis</figure-callout> <b>303</b>, in which the first profile dimension is
        greater than the second profile dimension. In the illustrated embodiment,
        the mouth portion has a generally oval shape cross-sectional profile, with
        the first profile dimension comprising a major axis and the second profile
        dimension comprising a minor axis. To meet the space restrictions presented
        by the blade stabilizer, the second profile dimension may be less than approximately
        3.5 inches.</div>\n  <div num=\"p-0091\" class=\"description-paragraph\">The
        <figure-callout id=\"304\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>304</b> is surrounded
        by an <figure-callout id=\"308\" label=\"inner packer\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">inner packer</figure-callout> <b>308</b>. An oval-shaped
        <figure-callout id=\"310\" label=\"guard inlet\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">guard inlet</figure-callout> <b>310</b> completely surrounds
        the <figure-callout id=\"308\" label=\"inner packer\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">inner packer</figure-callout> <b>308</b> and <figure-callout
        id=\"304\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>304</b>. The <figure-callout
        id=\"310\" label=\"guard inlet\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">guard inlet</figure-callout> <b>310</b> has a profile
        that is elongated along the longitudinal axis of the blade, similar to the
        <figure-callout id=\"304\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>304</b>. An <figure-callout
        id=\"312\" label=\"outer packer\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">outer packer</figure-callout> <b>312</b> surrounds a periphery
        of the <figure-callout id=\"310\" label=\"guard inlet\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">guard inlet</figure-callout> <b>310</b>. The inner and
        <figure-callout id=\"308\" label=\"outer packers\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\"> <figure-callout id=\"312\" label=\"outer packers\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">outer packers</figure-callout> </figure-callout> <b>308</b>,
        <b>312</b> have a thickness and/or are formed of a material that provides
        sufficient strength to withstand the pressure differentials generated during
        operation of the <figure-callout id=\"300\" label=\"probe assembly\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">probe assembly</figure-callout> <b>300</b>.</div>\n  <div
        num=\"p-0092\" class=\"description-paragraph\">The <figure-callout id=\"300\"
        label=\"probe assembly\" filenames=\"US07654321-20100202-D00008.png\" state=\"{{state}}\">probe
        assembly</figure-callout> <b>300</b> illustrated in <figref idrefs=\"DRAWINGS\">FIG.
        18</figref> is particularly suited for use in a stabilizing <figure-callout
        id=\"302\" label=\"blade\" filenames=\"US07654321-20100202-D00008.png\" state=\"{{state}}\">blade</figure-callout>
        <b>302</b> in while-drilling applications. As noted above, it is desirable
        to minimize the size of the inlets to maintain structural integrity of the
        drill collar. When provided within a stabilizing blade, inlet size is further
        restricted by the dimensions of the blade, particularly the relatively narrow
        width of the blade. As a result, the guard inlet must be reduced form a width
        of 4-10 inches or more (as is typical for wireline applications) to approximately
        3.5 inches or less to fit within the stabilizing blade. This disclosure is
        not limited to these specific dimensions, as the size of the guard inlet may
        be commensurate with the overall dimensions of the wellbore or the tool in
        which the guard inlet resides. After leaving sufficient room for the <figure-callout
        id=\"308\" label=\"inner packer\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">inner packer</figure-callout> <b>308</b>, only a relatively
        narrow space is left for the <figure-callout id=\"304\" label=\"sample inlet\"
        filenames=\"US07654321-20100202-D00008.png\" state=\"{{state}}\">sample inlet</figure-callout>
        <b>304</b>. The <figure-callout id=\"304\" label=\"sample inlet\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">sample inlet</figure-callout> <b>304</b>, however, must
        have a communication area that engages the formation that is sufficiently
        large to ensure adequate liquid flow. The elongated, oval shape of the <figure-callout
        id=\"306\" label=\"mouth portion\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">mouth portion</figure-callout> <b>306</b> increases the
        communication area of the <figure-callout id=\"304\" label=\"sample inlet\"
        filenames=\"US07654321-20100202-D00008.png\" state=\"{{state}}\">sample inlet</figure-callout>
        <b>304</b> while meeting space restrictions imposed by the blade structure.</div>\n
        \ <div num=\"p-0093\" class=\"description-paragraph\">With the increased communication
        area provided by the <figure-callout id=\"306\" label=\"mouth portion\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">mouth portion</figure-callout> <b>306</b>, it can be more
        difficult to form a sufficient seal between the <figure-callout id=\"308\"
        label=\"packers\" filenames=\"US07654321-20100202-D00008.png\" state=\"{{state}}\">
        <figure-callout id=\"312\" label=\"packers\" filenames=\"US07654321-20100202-D00008.png\"
        state=\"{{state}}\">packers</figure-callout> </figure-callout> <b>308</b>,
        <b>312</b> and the formation, since the increased contact area is more likely
        to encounter ruggosity or other formation surface deviations. The pivotable
        probe head discussed above in connection with <figref idrefs=\"DRAWINGS\">FIGS.
        17A and 17B</figref> may be employed with the elongated profile to minimize
        the effects of formation surface irregularities.</div>\n  <div num=\"p-0094\"
        class=\"description-paragraph\">While only certain embodiments have been set
        forth, alternatives and modifications will be apparent from the above description
        to those skilled in the art. These and other alternatives are considered equivalents
        and within the spirit and scope of this disclosure and the appended claims.</div>\n\n</div>\n
        \ </div>\n  </section>\n\n  <section itemprop=\"claims\" itemscope>\n    <h2>Claims
