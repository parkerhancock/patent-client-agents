name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev --all-extras

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  coverage-manifest:
    name: Validate coverage + atlas manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --group dev --all-extras
      - name: Validate manifests
        run: uv run python scripts/build_coverage.py --check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev --all-extras

      - name: Run type checking
        run: uv run ty check src/
        # Pre-existing baseline (as of 2026-05-19): 198 diagnostics:
        #   - 150 in src/law_tools_core/base_client.py — all
        #     `invalid-argument-type` on `__init__`. Likely one or two
        #     real annotation bugs cascading. Highest leverage; fix this
        #     file first.
        #   - ~45 across src/patent_client_agents/fees/scrapers/*.py
        #     (15 files, same `invalid-argument-type` pattern). Likely
        #     a shared base-class annotation issue rather than 15
        #     independent bugs.
        #   - 3 oddballs: 1 invalid-return-type in fees/scrapers/epo.py,
        #     2 invalid-declaration for `list[int | None]`.
        # Flip to blocking (remove `continue-on-error`) when this hits 0.
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --all-extras

      - name: Run tests with coverage
        # Coverage floor: 60% (current baseline: ~71% as of 2026-05-19).
        # Floor is set conservatively to catch regressions, not chase
        # 100%. Raise the floor when we comfortably clear the next +5%.
        run: |
          uv pip install pytest-cov
          uv run pytest --cov=patent_client_agents --cov-report=xml --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
