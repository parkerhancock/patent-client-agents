repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: catalog-lint
        name: Lint catalog pages against _TEMPLATE.md
        entry: uv run python scripts/lint_catalog.py
        language: system
        pass_filenames: false
        files: ^(src/patent_client_agents/catalog/|CATALOG\.md$)

  # ty type checker disabled in pre-commit due to external library type issues
  # Run manually with: uv run ty check src/patent_client_agents/
