# patent-client-agents coverage manifest
#
# Source of truth for the coverage page. Schema is closed-vocabulary;
# the validator in `scripts/build_coverage.py` enforces every field.
# See CONNECTOR_STANDARDS.md §6 for the contract.
#
# Edit this file by hand. After editing, run:
#   uv run python scripts/build_coverage.py --check   # validate only
#   uv run python scripts/build_coverage.py           # writes coverage/coverage.json
#
# Classification rules for ambiguous sources (CONNECTOR_STANDARDS.md §6):
#   - CPC                       → registered_ip   (classification of the register)
#   - USITC investigations      → registered_ip   (tribunal adjudicating rights, like PTAB)
#   - EPO Case Law              → substantive_law, cadence: annual (bundled-artifact rhythm)
#   - CAFC / UPC / CanLII cases → substantive_law (reviewing-court interpretation)

