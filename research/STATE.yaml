# Coverage pipeline state
#
# Machine-parseable single-source-of-truth for what's covered, what's
# in research, what's planned, what's shipped.
#
# Read by orchestration agents (PIPELINE.md §5) to determine next batch
# of unblocked work. Updated by research/coding agents on completion.
#
# Field meanings:
#   id:                 stable ID (matches coverage/sources.yaml convention)
#   name:               human display
#   layer:              multilateral | regional | national
#   iso2:               ISO 3166-1 alpha-2 (or n/a for regional/multilateral)
#   rights:             list from {patent, utility_model, trademark, design, copyright, plant_variety, gi, trade_secret}
#   synopsis:           path or null (null = not written)
#   detail_survey:      path or null
#   connector_spec:     path or null (when rating crosses into build)
#   rating:           green | yellow_byok | yellow_paid | red_tos | red_no_api |
#                       red_bulk_only | red_contract | watch | tbd
#   rating_basis:       one-line explanation
#   connector_status:   none | planned | spec_ready | in_progress | shipped |
#                       skipped | blocked
#   manifest_ids:       list of IDs in coverage/sources.yaml (when shipped)
#   next_action:        what's next; drives agent selection
#                       (synopsis_discovery | spec_writing |
#                        connector_build | monitor_partner_api | none)
#   blocked_by:         list of other entity IDs that must complete first
#   last_verified:      date of last research touch (YYYY-MM-DD)
#   notes:              one-line free text
#
# When updating: bump `last_updated` and the affected row's `last_verified`.

