    notes: |
      Loi 17-97 (industrial property, as amended); Loi 2-00 (copyright, BMDA,
      separate from OMPIC). PCT contracting state (1999-10-08). Madrid
      Protocol member (1999-10-08). Hague Agreement (1999 Geneva Act)
      deposited 2022-04-22 (not 1957 — that was the 1934/1960-Act era).
      Only African EPO Validation State — EPO OPS covers MA patents at
      decent fidelity via INPADOC + the validation relationship. Not
      ARIPO/OAPI. Recommend native MA connector declined; rely on EPO OPS,
      WIPO Madrid Monitor, Hague Express, PATENTSCOPE.

